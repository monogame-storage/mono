name: PR Check

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: JS syntax check (runtime/)
        run: |
          fail=0
          for f in runtime/*.js; do
            echo "Checking $f"
            if ! node --check "$f"; then
              fail=1
            fi
          done
          exit $fail

      - name: Setup Lua
        uses: leafo/gh-actions-lua@35bcb06abec04ec87df82e08caa84d545348536e # v10
        with:
          luaVersion: '5.4'

      - name: Lua syntax check
        run: |
          fail=0
          while IFS= read -r f; do
            echo "Checking $f"
            if ! luac -p "$f"; then
              fail=1
            fi
          done < <(find . -name '*.lua' -type f -not -path './node_modules/*')
          exit $fail

      - name: Run all demos headlessly (mono-runner)
        run: |
          fail=0
          for d in demo/*/; do
            entry="${d}main.lua"
            if [ ! -f "$entry" ]; then
              echo "SKIP $d (no main.lua)"
              continue
            fi
            echo "Running $entry"
            if node dev/headless/mono-runner.js "$entry" --frames 60 --quiet; then
              echo "  OK"
            else
              echo "  FAIL"
              fail=1
            fi
          done
          exit $fail

  # Cosmi (the Cloudflare Worker that runs the chat agent + lint
  # pipeline) lives in its own subtree with its own package.json and
  # wrangler config. Validating it here catches:
  #   - syntax / import regressions in the worker source
  #   - lint regressions (api-lint, engine-primitive guard, gameId guard)
  #   - prompt / tool drift (agent-prompt.test.mjs)
  #   - wrangler.toml breakage (e.g. assets misconfig that broke deploy
  #     earlier)
  # Runs in parallel with the mono-side validate job above.
  validate-cosmi:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cosmi
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: cosmi/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: JS syntax check
        run: npm run check

      - name: Unit tests
        run: npm test

      - name: Wrangler dry-run deploy
        run: npx --yes wrangler@latest deploy --dry-run --outdir dist

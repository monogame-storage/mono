<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Mono</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#000;overflow:hidden;touch-action:none;-webkit-user-select:none;user-select:none}
#game-container{display:flex;flex-direction:column;align-items:center;width:100%;height:100%}
#screen{image-rendering:pixelated;image-rendering:crisp-edges;background:#000;flex-shrink:0}
#gamepad{width:100%;flex:1;display:flex;align-items:center;justify-content:center;padding:0 20px}

/* Mobile overrides for console-gamepad.js */
.mono-gp{gap:24px!important;width:100%}
.mono-gp-row{padding:0 10px}
.mono-dpad{width:160px!important;height:160px!important}
.mono-dpad-btn{width:52px!important;height:52px!important;font-size:22px!important}
.mono-dpad-up{left:54px!important;top:0!important}
.mono-dpad-down{left:54px!important;top:108px!important}
.mono-dpad-left{left:0!important;top:54px!important}
.mono-dpad-right{left:108px!important;top:54px!important}
.mono-dpad-center{left:54px!important;top:54px!important;width:52px!important;height:52px!important}
.mono-ab{width:160px!important;height:120px!important}
.mono-ab-btn{width:68px!important;height:68px!important;font-size:24px!important}
.mono-ab .btn-b{left:0!important;top:52px!important}
.mono-ab .btn-a{left:92px!important;top:10px!important}
.mono-gp-meta button{font-size:9px!important;padding:2px 20px!important}
</style>
</head>
<body>
<div id="game-container">
  <canvas id="screen"></canvas>
  <div id="gamepad" data-gamepad-mode="setKey"></div>
</div>
<script src="engine/engine.js"></script>
<script src="engine/console-gamepad.js"></script>
<script>
function fitScreen(){
  var c=document.getElementById('screen');
  var gp=document.getElementById('gamepad');
  var gpH=Math.max(220, window.innerHeight*0.38);
  gp.style.height=gpH+'px';
  var availH=window.innerHeight-gpH;
  var s=Math.min(window.innerWidth/160, availH/144);
  c.style.width=Math.floor(160*s)+'px';
  c.style.height=Math.floor(144*s)+'px';
  c.style.marginTop=Math.floor((availH-144*s)/2)+'px';
}
fitScreen();window.addEventListener('resize',fitScreen);
Mono.boot('screen',{game:'main.lua',noAutoFit:true,externalInput:true}).catch(function(e){console.error('BOOT_ERR',e)});
</script>
</body>
</html>

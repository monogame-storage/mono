<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mono вҖ” Font Showcase</title>
<link rel="stylesheet" href="../../runtime/mono.css">
</head>
<body>
<div id="frame">
  <canvas id="screen"></canvas>
</div>
<div id="controls">
  <span>A</span> SIZE+ &nbsp;&nbsp; <span>B</span> SIZE- &nbsp;&nbsp; <span>ARROWS</span> SCROLL
</div>
<script src="../../runtime/engine.js"></script>
<script>
(() => {
  "use strict";
  const { cls, text, rectf, rect, line, pix, btn, btnp, flr } = Mono;
  const W = Mono.WIDTH, H = Mono.HEIGHT;

  // === Latin font data (4x7) ===
  const latinFont = {
    "A":"0110100110011111100110011001","B":"1110100110101110100110011110",
    "C":"0110100110001000100001100110","D":"1100101010011001100110101100",
    "E":"1111100010001110100010001111","F":"1111100010001110100010001000",
    "G":"0111100010001011100101100111","H":"1001100110011111100110011001",
    "I":"1110010001000100010001001110","J":"0111001000100010001010100100",
    "K":"1001101011001100101010011001","L":"1000100010001000100010001111",
    "M":"1001111111011001100110011001","N":"1001110111011001100110011001",
    "O":"0110100110011001100110010110","P":"1110100110011110100010001000",
    "Q":"0110100110011001101101100001","R":"1110100110011110101010011001",
    "S":"0111100010000110000110001110","T":"1111001000100010001000100010",
    "U":"1001100110011001100110010110","V":"1001100110011001100101100110",
    "W":"1001100110011001101111011001","X":"1001100101100110011010011001",
    "Y":"1001100101100010001000100010","Z":"1111000100100100100010001111",
    "0":"0110100111011011101110010110","1":"0100110001000100010001001110",
    "2":"0110100100010010010010001111","3":"1110000100010110000110011110",
    "4":"1001100110011111000100010001","5":"1111100010001110000100011110",
    "6":"0110100010001110100110010110","7":"1111000100010010010001001000",
    "8":"0110100110010110100110010110","9":"0110100110010111000100010110",
    " ":"0000000000000000000000000000",
    ".":"0000000000000000000001000100",
    ",":"0000000000000000001000101000",
    "!":"0100010001000100000000000100",
    "?":"0110100100010010000000000010",
    "-":"0000000000001110000000000000",
    "+":"0000001001001110010000100000",
    ":":"0000010001000000010001000000",
    "/":"0001000100100010010010001000",
    "*":"0000101001001110010010100000",
    "#":"0101111101011111010100000000",
    "(":"0010010010001000010001000010",
    ")":"0100001000010001000100100100",
    "=":"0000000011110000111100000000",
    "'":"0100010010000000000000000000",
    "\"":"1010101000000000000000000000",
    "<":"0010010010001000010000100010",
    ">":"1000010000100001001001001000",
    "_":"0000000000000000000000001111",
  };

  // === Korean Jamo Bitmaps (for 16x16 composition) ===
  // мҙҲм„ұ (initial consonants) - top portion of cell
  // Format: width x height bitmap string, positioned in cell
  // Two sets: A = no мў…м„ұ, B = has мў…м„ұ (compressed vertically)

  // мҙҲм„ұ order: г„ұг„Іг„ҙг„·г„ёг„№г…Ғг…Ӯг…ғг……г…Ҷг…Үг…Ҳг…үг…Ҡг…Ӣг…Ңг…Қг…Һ
  const CHO = [
    // г„ұ
    ["00000000","11111100","00001100","00011000","00110000","01100000","11000000","00000000"],
    // г„І
    ["00000000","11101110","00100010","01000100","01000100","10001000","00000000","00000000"],
    // г„ҙ
    ["00000000","10000000","10000000","10000000","10000000","10000000","11111100","00000000"],
    // г„·
    ["00000000","11111100","10000000","10000000","10000000","10000000","11111100","00000000"],
    // г„ё
    ["00000000","11101110","10001000","10001000","10001000","10001000","11101110","00000000"],
    // г„№
    ["00000000","11111100","00000100","11111100","10000000","10000000","11111100","00000000"],
    // г…Ғ
    ["00000000","11111100","10000100","10000100","10000100","10000100","11111100","00000000"],
    // г…Ӯ
    ["00000000","10000100","10000100","11111100","10000100","10000100","11111100","00000000"],
    // г…ғ
    ["00000000","10101010","10101010","11101110","10101010","10101010","11101110","00000000"],
    // г……
    ["00000000","00010000","00101000","00101000","01000100","10000010","00000000","00000000"],
    // г…Ҷ
    ["00000000","01001000","01001000","10010100","10010100","00100010","00000000","00000000"],
    // г…Ү
    ["00000000","01111000","10000100","10000100","10000100","10000100","01111000","00000000"],
    // г…Ҳ
    ["00000000","11111100","00010000","00101000","01000100","10000010","00000000","00000000"],
    // г…ү
    ["00000000","11111110","01001000","01001000","10010100","10010100","00100010","00000000"],
    // г…Ҡ
    ["00010000","00010000","11111100","00010000","00101000","01000100","10000010","00000000"],
    // г…Ӣ
    ["00000000","11111100","00001100","11111100","00110000","01100000","11000000","00000000"],
    // г…Ң
    ["00000000","11111100","10000000","11111100","10000000","10000000","11111100","00000000"],
    // г…Қ
    ["00000000","11111100","01000100","01000100","01000100","01000100","11111100","00000000"],
    // г…Һ
    ["00010000","11111100","00010000","01111000","10000100","10000100","01111000","00000000"],
  ];

  // мӨ‘м„ұ (vowels) - classified by shape
  // V = vertical (right side), H = horizontal (bottom), C = combined
  // мӨ‘м„ұ order: г…Ҹг…җг…‘г…’г…“г…”г…•г…–г…—г…ҳг…ҷг…ҡг…ӣг…ңг…қг…һг…ҹг… г…Ўг…ўг…Ј
  const JUNG_TYPE = [
    "V","V","V","V","V","V","V","V",  // г…Ҹг…җг…‘г…’г…“г…”г…•г…–
    "H","C","C","C","H","H","C","C","C","H","H","C","V"  // г…—г…ҳг…ҷг…ҡг…ӣг…ңг…қг…һг…ҹг… г…Ўг…ўг…Ј
  ];

  // Vertical vowels (drawn on right side, 4x16 or so)
  const JUNG_V = {
    0:  ["10","10","10","10","10","11","10","10","10","10","10","10","10","00","00","00"], // г…Ҹ
    1:  ["1010","1010","1010","1010","1010","1110","1010","1010","1010","1010","1010","1010","1010","0000","0000","0000"], // г…җ
    2:  ["10","10","11","10","10","10","10","11","10","10","10","10","10","00","00","00"], // г…‘
    3:  ["1010","1010","1110","1010","1010","1010","1010","1110","1010","1010","1010","1010","1010","0000","0000","0000"], // г…’
    4:  ["01","01","01","01","01","11","01","01","01","01","01","01","01","00","00","00"], // г…“
    5:  ["0101","0101","0101","0101","0101","0111","0101","0101","0101","0101","0101","0101","0101","0000","0000","0000"], // г…”
    6:  ["01","01","11","01","01","01","01","11","01","01","01","01","01","00","00","00"], // г…•
    7:  ["0101","0101","0111","0101","0101","0101","0101","0111","0101","0101","0101","0101","0101","0000","0000","0000"], // г…–
    20: ["01","01","01","01","01","01","01","01","01","01","01","01","01","00","00","00"], // г…Ј
  };

  // Horizontal vowels (drawn below, 16x4 or so)
  const JUNG_H = {
    8:  ["00000000","00000000","11111111","00000000"], // г…— (with bump up)
    12: ["00000000","00000000","11111111","00000000"], // г…ӣ
    13: ["00000000","11111111","00000000","00000000"], // г…ң
    17: ["00000000","11111111","00000000","00000000"], // г… 
    18: ["00000000","11111111","00000000","00000000"], // г…Ў
  };

  // мў…м„ұ (final consonants) - bottom portion
  // мў…м„ұ order: (none) г„ұг„Іг„іг„ҙг„өг„¶г„·г„№г„әг„»г„јг„Ҫг„ҫг„ҝг…Җг…Ғг…Ӯг…„г……г…Ҷг…Үг…Ҳг…Ҡг…Ӣг…Ңг…Қг…Һ
  const JONG = [
    null, // 0 = no мў…м„ұ
    ["11111100","00001100","00011000","00110000"], // г„ұ
    ["11101110","00100010","01000100","10001000"], // г„І
    ["11101110","00100010","01001100","10010000"], // г„і
    ["10000000","10000000","10000000","11111100"], // г„ҙ
    ["10000000","10011110","10010010","11111110"], // г„ө
    ["10000000","10011100","10000100","11111000"], // г„¶
    ["11111100","10000000","10000000","11111100"], // г„·
    ["11111100","00000100","11111100","11111100"], // г„№
    ["11101110","00100010","11100100","11001000"], // г„ә
    ["11101110","00101000","11101000","11101110"], // г„»
    ["11101100","00101000","11101100","11101100"], // г„ј
    ["11101110","00100010","11100100","11011000"], // г„Ҫ
    ["11101110","00100010","11101110","11000100"], // г„ҫ
    ["11101110","00100010","11101100","11001000"], // г„ҝ
    ["11101100","00101010","11101010","11001100"], // г…Җ
    ["11111100","10000100","10000100","11111100"], // г…Ғ
    ["10000100","11111100","10000100","11111100"], // г…Ӯ
    ["10001110","11110010","10001100","11110000"], // г…„
    ["00010000","00101000","01000100","10000010"], // г……
    ["01001000","01001000","10010100","00100010"], // г…Ҷ
    ["01111000","10000100","10000100","01111000"], // г…Ү
    ["11111100","00010000","00101000","01000100"], // г…Ҳ
    ["00010000","11111100","00101000","01000100"], // г…Ҡ
    ["11111100","00001100","11111100","01100000"], // г…Ӣ
    ["11111100","10000000","11111100","11111100"], // г…Ң
    ["11111100","01000100","01000100","11111100"], // г…Қ
    ["00010000","11111100","01111000","01111000"], // г…Һ
  ];

  // Decompose Unicode Hangul to jamo indices
  function decomposeHangul(ch) {
    const code = ch.charCodeAt(0);
    if (code < 0xAC00 || code > 0xD7A3) return null;
    const offset = code - 0xAC00;
    const cho = Math.floor(offset / 588);
    const jung = Math.floor((offset % 588) / 28);
    const jong = offset % 28;
    return { cho, jung, jong };
  }

  // Draw a single Korean character at (x, y) with color c and scale s
  function drawKorean(ch, x, y, c, s) {
    const d = decomposeHangul(ch);
    if (!d) return;
    const { cho, jung, jong } = d;
    const jType = JUNG_TYPE[jung];
    const hasJong = jong > 0;

    if (jType === "V") {
      // Vertical vowel: мҙҲм„ұ left, мӨ‘м„ұ right
      const choH = hasJong ? 5 : 7;
      drawChoBitmap(cho, x, y, c, s, 8, choH);
      drawJungV(jung, x + 9 * s, y, c, s, hasJong);
      if (hasJong) drawJongBitmap(jong, x, y + 12 * s, c, s, 12);
    } else if (jType === "H") {
      // Horizontal vowel: мҙҲм„ұ top, мӨ‘м„ұ below
      const choH = hasJong ? 5 : 6;
      drawChoBitmap(cho, x, y, c, s, 12, choH);
      const jungY = hasJong ? 6 : 8;
      drawJungH(jung, x, y + jungY * s, c, s, 12);
      if (hasJong) drawJongBitmap(jong, x, y + 11 * s, c, s, 12);
    } else {
      // Combined: мҙҲм„ұ top-left, мӨ‘м„ұ right+bottom
      const choH = hasJong ? 5 : 6;
      drawChoBitmap(cho, x, y, c, s, 8, choH);
      // Draw vertical part
      const vIdx = jung === 9 || jung === 14 ? 0 : // г…ҳвҶ’г…Ҹ, г…қвҶ’г…“
                   jung === 10 || jung === 15 ? 1 : // г…ҷвҶ’г…җ, г…һвҶ’г…”
                   jung === 11 ? 20 : // г…ҡвҶ’г…Ј
                   jung === 16 ? 20 : // г…ҹвҶ’г…Ј
                   jung === 19 ? 20 : 0; // г…ўвҶ’г…Ј
      drawJungV(vIdx, x + 9 * s, y, c, s, hasJong);
      // Draw horizontal part
      const hIdx = (jung >= 9 && jung <= 12) ? 8 :  // г…— based
                   (jung >= 13 && jung <= 17) ? 13 : 18; // г…ң or г…Ў based
      const jungY = hasJong ? 6 : 8;
      drawJungH(hIdx, x, y + jungY * s, c, s, 8);
      if (hasJong) drawJongBitmap(jong, x, y + 11 * s, c, s, 12);
    }
  }

  function drawChoBitmap(idx, x, y, c, s, w, rows) {
    const cho = CHO[idx];
    if (!cho) return;
    for (let py = 0; py < Math.min(cho.length, rows); py++) {
      const row = cho[py];
      for (let px = 0; px < row.length; px++) {
        if (row[px] === "1") {
          for (let sy = 0; sy < s; sy++)
            for (let sx = 0; sx < s; sx++)
              pix(x + px * s + sx, y + py * s + sy, c);
        }
      }
    }
  }

  function drawJungV(idx, x, y, c, s, hasJong) {
    const data = JUNG_V[idx];
    if (!data) return;
    const rows = hasJong ? 11 : 13;
    for (let py = 0; py < Math.min(data.length, rows); py++) {
      const row = data[py];
      for (let px = 0; px < row.length; px++) {
        if (row[px] === "1") {
          for (let sy = 0; sy < s; sy++)
            for (let sx = 0; sx < s; sx++)
              pix(x + px * s + sx, y + py * s + sy, c);
        }
      }
    }
  }

  function drawJungH(idx, x, y, c, s, w) {
    const data = JUNG_H[idx];
    if (!data) return;
    for (let py = 0; py < data.length; py++) {
      const row = data[py];
      for (let px = 0; px < Math.min(row.length, w); px++) {
        if (row[px] === "1") {
          for (let sy = 0; sy < s; sy++)
            for (let sx = 0; sx < s; sx++)
              pix(x + px * s + sx, y + py * s + sy, c);
        }
      }
    }
  }

  function drawJongBitmap(idx, x, y, c, s, w) {
    const data = JONG[idx];
    if (!data) return;
    for (let py = 0; py < data.length; py++) {
      const row = data[py];
      for (let px = 0; px < Math.min(row.length, w); px++) {
        if (row[px] === "1") {
          for (let sy = 0; sy < s; sy++)
            for (let sx = 0; sx < s; sx++)
              pix(x + px * s + sx, y + py * s + sy, c);
        }
      }
    }
  }

  // Draw Latin text at scale
  const LFW = 4, LFH = 7;
  function drawLatin(str, x, y, c, s) {
    str = String(str).toUpperCase();
    let cx = x;
    for (const ch of str) {
      const bits = latinFont[ch];
      if (bits) {
        for (let py = 0; py < LFH; py++) {
          for (let px = 0; px < LFW; px++) {
            if (bits[py * LFW + px] === "1") {
              for (let sy = 0; sy < s; sy++)
                for (let sx = 0; sx < s; sx++)
                  pix(cx + px * s + sx, y + py * s + sy, c);
            }
          }
        }
      }
      cx += (LFW + 1) * s;
    }
  }

  // Draw mixed text (auto-detect Korean)
  function drawMixed(str, x, y, c, s) {
    let cx = x;
    for (const ch of str) {
      const code = ch.charCodeAt(0);
      if (code >= 0xAC00 && code <= 0xD7A3) {
        drawKorean(ch, cx, y, c, s);
        cx += 13 * s;
      } else {
        const upper = ch.toUpperCase();
        const bits = latinFont[upper];
        if (bits) {
          for (let py = 0; py < LFH; py++) {
            for (let px = 0; px < LFW; px++) {
              if (bits[py * LFW + px] === "1") {
                for (let sy = 0; sy < s; sy++)
                  for (let sx = 0; sx < s; sx++)
                    pix(cx + px * s + sx, y + py * s + sy, c);
              }
            }
          }
        }
        cx += (LFW + 1) * s;
      }
    }
  }

  let scale = 2;
  let scrollY = 0;

  Mono.scene("title", {
    init() { scale = 2; scrollY = 0; },
    update() {
      if (btnp("a")) { scale = Math.min(scale + 1, 4); scrollY = 0; }
      if (btnp("b")) { scale = Math.max(scale - 1, 1); scrollY = 0; }
      if (btn("down")) scrollY += 6;
      if (btn("up")) scrollY = Math.max(scrollY - 6, 0);
    },
    draw() {
      cls(0);
      const s = scale;
      let y = 8 - flr(scrollY);

      // Header
      text("MONO FONT SHOWCASE", 80, y, 3);
      y += 10;
      text("A:SIZE+  B:SIZE-  ARROWS:SCROLL", 20, y, 1);
      y += 12;
      line(10, y, 310, y, 1);
      y += 6;

      // Scale indicator
      drawLatin("SCALE " + s + "X", 12, y, 3, s);
      y += LFH * s + s * 2 + 4;

      // Latin alphabet
      text("LATIN", 12, y, 1); y += 10;
      drawLatin("ABCDEFGHIJKLM", 12, y, 3, s);
      y += LFH * s + s + 2;
      drawLatin("NOPQRSTUVWXYZ", 12, y, 3, s);
      y += LFH * s + s + 2;
      drawLatin("0123456789", 12, y, 2, s);
      y += LFH * s + s * 2 + 6;

      // Korean section
      line(10, y, 310, y, 1); y += 6;
      text("KOREAN (HANGUL)", 12, y, 1); y += 10;

      // мһҗмқҢ
      text("CONSONANTS", 12, y, 1); y += 10;
      drawMixed("к°ҖлӮҳлӢӨлқјл§Ҳл°”мӮ¬", 12, y, 3, s);
      y += 14 * s + 4;
      drawMixed("м•„мһҗм°Ём№ҙнғҖнҢҢн•ҳ", 12, y, 3, s);
      y += 14 * s + 6;

      // лӘЁмқҢ
      text("VOWELS", 12, y, 1); y += 10;
      drawMixed("м•„м–ҙмҳӨмҡ°мңјмқҙ", 12, y, 3, s);
      y += 14 * s + 4;
      drawMixed("м• м—җм•јм—¬мҡ”мң ", 12, y, 2, s);
      y += 14 * s + 6;

      // л°ӣм№Ё
      text("WITH FINAL CONSONANT", 12, y, 1); y += 10;
      drawMixed("к°•лӮЁлӢ¬л°ӨмӮ°м•ҷ", 12, y, 3, s);
      y += 14 * s + 4;
      drawMixed("кі°лі„н•ңкёҖм§қлӘ«", 12, y, 2, s);
      y += 14 * s + 6;

      // Game text examples
      line(10, y, 310, y, 1); y += 6;
      text("GAME TEXT", 12, y, 1); y += 10;
      drawMixed("кІҢмһ„ мӢңмһ‘", 12, y, 3, s);
      y += 14 * s + 4;
      drawMixed("кІҢмһ„ мҳӨлІ„", 12, y, 3, s);
      y += 14 * s + 4;
      drawMixed("м җмҲҳ 12345", 12, y, 2, s);
      y += 14 * s + 4;
      drawMixed("мҠӨн…Ңмқҙм§Җ нҒҙлҰ¬м–ҙ!", 12, y, 3, s);
      y += 14 * s + 4;
      drawMixed("лӘ©мҲЁ 3", 12, y, 2, s);
      y += 14 * s + 6;

      // Mixed text
      line(10, y, 310, y, 1); y += 6;
      text("MIXED", 12, y, 1); y += 10;
      drawMixed("MONO м ңм•Ҫмқҙ кі§ м°Ҫмқҳл Ҙ", 12, y, 3, s);
      y += 14 * s + 4;
      drawMixed("320x240 нҷ”л©ҙ", 12, y, 2, s);
      y += 14 * s + 8;

      // All scales comparison
      line(10, y, 310, y, 1); y += 6;
      text("ALL SCALES", 12, y, 1); y += 10;
      for (let cs = 1; cs <= 4; cs++) {
        const col = cs === s ? 3 : 1;
        text(cs + "X", 12, y, col);
        drawMixed("н•ңкёҖ", 32, y, col, cs);
        y += 14 * cs + 4;
      }

      // Scroll hint
      const blink = flr(Mono.frame / 15) % 2;
      if (blink && y > H) text("V MORE BELOW V", 110, H - 10, 1);
    }
  });

  Mono.go("title");
  Mono.boot("screen");
})();
</script>
</body>
</html>

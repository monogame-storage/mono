<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mono — Demos</title>
<link rel="icon" href="/favicon.png" type="image/png">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a1a;
    color: #e8e8e8;
    font-family: monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px;
  }
  h1 { font-size: 16px; margin-bottom: 24px; color: #999; font-weight: normal; }
  .list {
    width: 100%;
    max-width: 320px;
    display: flex;
    flex-direction: column;
  }
  .list a {
    color: #e8e8e8;
    text-decoration: none;
    padding: 10px 12px;
    font-size: 14px;
    border-bottom: 1px solid #333;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .list a:first-child { border-top: 1px solid #333; }
  .list a:hover { background: #2a2a2a; }
  .list a .tag {
    font-size: 10px;
    color: #666;
    padding: 2px 6px;
    border: 1px solid #444;
    border-radius: 3px;
  }
  .back {
    margin-top: 24px;
    font-size: 12px;
    color: #555;
    text-decoration: none;
  }
  .back:hover { color: #999; }
</style>
</head>
<body>
  <h1>Mono Demos</h1>
  <div class="list">
    <a href="/play.html?game=bubble">bubble <span class="tag">touch</span></a>
    <a href="/play.html?game=bounce">bounce</a>
    <a href="/play.html?game=pong">pong</a>
    <a href="/play.html?game=dodge">dodge</a>
    <a href="/play.html?game=invaders">invaders</a>
    <a href="/demos/scene-test/">scene-test</a>
    <a href="/demos/shader-test/">shader-test</a>
  </div>
  <a class="back" href="/">&larr; home</a>
</body>
</html>

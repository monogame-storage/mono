<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mono — Shader Test</title>
<link rel="icon" href="/favicon.png" type="image/png">
<link rel="stylesheet" href="../../runtime/mono.css">
<style>
  body { height: auto; overflow: auto; }
  #controls {
    max-width: 640px;
    margin: 12px auto 0;
    padding: 12px 16px;
    font-family: monospace;
    font-size: 13px;
    color: #aaa;
  }
  .section {
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
    padding: 8px 4px;
    border-bottom: 1px solid #333;
  }
  .section-label {
    color: #666;
    font-size: 11px;
    width: 50px;
    flex-shrink: 0;
  }
  .shader-row {
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
    padding: 8px 4px;
    border-bottom: 1px solid #2a2a2a;
  }
  .shader-row:last-child { border-bottom: none; }
  .shader-row .drag-handle {
    cursor: grab;
    color: #555;
    font-size: 14px;
    padding: 0 2px;
    user-select: none;
  }
  .shader-row .drag-handle:hover { color: #aaa; }
  .shader-row .drag-handle:active { cursor: grabbing; }
  .shader-row.dragging { opacity: 0.3; }
  .shader-row.drag-over { border-top: 2px solid #888; }
  .shader-row label.name {
    color: #ccc;
    width: 65px;
    flex-shrink: 0;
  }
  .shader-params { display: flex; flex-direction: column; gap: 4px; flex: 1; }
  .shader-params .param-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  #controls select, #controls input[type="range"], #controls input[type="color"] {
    font-family: monospace;
    font-size: 13px;
    background: #222;
    color: #eee;
    border: 1px solid #555;
    padding: 3px 6px;
    border-radius: 4px;
  }
  #controls label { color: #888; }
  .row-buttons { display: flex; gap: 4px; margin-left: auto; }
  .btn-remove, .btn-toggle {
    background: none;
    border: 1px solid #555;
    color: #888;
    font-family: monospace;
    font-size: 13px;
    padding: 1px 7px;
    border-radius: 4px;
    cursor: pointer;
  }
  .btn-remove:hover { color: #f66; border-color: #f66; }
  .btn-toggle { min-width: 28px; }
  .btn-toggle.on { color: #8f8; border-color: #585; }
  .btn-toggle.off { color: #888; border-color: #555; }
  .shader-row.disabled .shader-params { opacity: 0.3; pointer-events: none; }
  .shader-row.disabled label.name { color: #666; }
  #add-row {
    display: flex;
    gap: 8px;
    align-items: center;
    padding: 6px 0;
  }
  #add-row select, #add-row button {
    font-family: monospace;
    font-size: 13px;
    background: #222;
    color: #eee;
    border: 1px solid #555;
    padding: 3px 8px;
    border-radius: 4px;
    cursor: pointer;
  }
  #add-row button:hover { background: #444; }
  #info { text-align: center; font-family: monospace; font-size: 11px; color: #555; margin-top: 6px; }
</style>
</head>
<body>
  <a href="/demos/" style="color:#888;font-size:12px">← back</a>
<div id="frame">
  <canvas id="screen"></canvas>
</div>
<div id="controls">
  <div class="section">
    <span class="section-label">Display</span>
    <label>Scale:</label>
    <select id="scale-select">
      <option value="max">max integer</option>
      <option value="fit">fit (fractional)</option>
      <option value="3">3x (480x432)</option>
      <option value="4">4x (640x576)</option>
      <option value="5">5x (800x720)</option>
    </select>
  </div>
  <div id="chain-ui"></div>
  <div id="add-row">
    <select id="add-select"></select>
    <button id="add-btn">+</button>
  </div>
</div>
<div id="info"></div>
<script>
  // Cache-bust all runtime scripts
  const scripts = [
    "../../runtime/engine.js",
    "../../runtime/shader.js",
    "../../runtime/shaders/tint.js",
    "../../runtime/shaders/scanlines.js",
    "../../runtime/shaders/lcd.js",
    "../../runtime/shaders/lcd3d.js",
    "../../runtime/shaders/crt.js",
    "../../runtime/shaders/invert_lcd.js",
  ];
  const v = Date.now();
  document.write(scripts.map(s => `<script src="${s}?v=${v}"><\/script>`).join("\n"));
</script>
<script>
Mono.boot("screen", { game: "game.lua", colors: 4 }).then(() => {
  const W = 160, H = 144;
  const canvas = document.getElementById("screen");
  const scaleSel = document.getElementById("scale-select");
  const chainUI = document.getElementById("chain-ui");
  const addSelect = document.getElementById("add-select");
  const addBtn = document.getElementById("add-btn");
  const info = document.getElementById("info");

  const TINT_COLORS = {
    green: [0.6, 0.9, 0.3],
    amber: [1.0, 0.75, 0.3],
    blue:  [0.4, 0.6, 1.0],
  };

  // Active chain (UI state — ordered list of shader names currently shown)
  let uiChain = [];

  // --- Scale ---
  function updateInfo() {
    const dw = parseInt(canvas.style.width) || W;
    const dh = parseInt(canvas.style.height) || H;
    const sx = (dw / W).toFixed(2);
    const sy = (dh / H).toFixed(2);
    const isInt = (dw % W === 0 && dh % H === 0);
    info.textContent = `display: ${dw}x${dh}  scale: ${sx}x${sy}  ${isInt ? "integer" : "fractional"}`;
  }

  function applyScale() {
    const val = scaleSel.value;
    const maxW = window.innerWidth - 40;
    const maxH = window.innerHeight - 140;
    let s;
    if (val === "fit") {
      s = Math.min(maxW / W, maxH / H);
    } else if (val === "max") {
      s = Math.max(1, Math.floor(Math.min(maxW / W, maxH / H)));
    } else {
      s = parseInt(val);
    }
    canvas.style.width = (W * s) + "px";
    canvas.style.height = (H * s) + "px";
    updateInfo();
  }
  scaleSel.addEventListener("change", applyScale);

  // --- Helpers ---
  function hexToRgb(hex) {
    return [
      parseInt(hex.slice(1,3), 16) / 255,
      parseInt(hex.slice(3,5), 16) / 255,
      parseInt(hex.slice(5,7), 16) / 255,
    ];
  }
  function rgbToHex(rgb) {
    return "#" + rgb.map(v => Math.round(v * 255).toString(16).padStart(2, "0")).join("");
  }

  // --- Sync engine chain from uiChain ---
  function syncChain() {
    Mono.shader.order(uiChain);
    // Disable shaders not in uiChain
    for (const name of Mono.shader.list()) {
      if (uiChain.indexOf(name) === -1) Mono.shader.disable(name);
    }
  }

  // --- Build param controls for a shader ---
  function buildParams(name, paramsDiv) {
    const defaults = Mono.shader.defaults(name);
    if (!defaults) return;

    if (name === "tint") {
      const sel = document.createElement("select");
      sel.innerHTML = '<option value="amber">amber</option><option value="green">green</option><option value="blue">blue</option><option value="custom">custom</option>';
      const picker = document.createElement("input");
      picker.type = "color";
      picker.value = rgbToHex(TINT_COLORS.green);
      picker.style.display = "none";
      sel.addEventListener("change", () => {
        if (sel.value === "custom") {
          picker.style.display = "";
          Mono.shader.param("tint", "tint", hexToRgb(picker.value));
        } else {
          picker.style.display = "none";
          Mono.shader.param("tint", "tint", TINT_COLORS[sel.value]);
        }
      });
      picker.addEventListener("input", () => {
        Mono.shader.param("tint", "tint", hexToRgb(picker.value));
      });
      paramsDiv.appendChild(sel);
      paramsDiv.appendChild(picker);
      return;
    }

    // Group related params into rows
    // Layout: sliders together, colors together, toggles+colors together
    const groups = { sliders: [], colors: [], toggles: [] };
    for (const [key, val] of Object.entries(defaults)) {
      if (key === "invert") groups.toggles.push([key, val]);
      else if (Array.isArray(val) && val.length === 3) groups.colors.push([key, val]);
      else if (typeof val === "number") groups.sliders.push([key, val]);
    }

    function makeSlider(name, key, val, container) {
      const lp = document.createElement("label");
      lp.textContent = key.slice(0, 5) + ":";
      const isLarge = val > 1;
      const slider = document.createElement("input");
      slider.type = "range";
      slider.min = 0;
      slider.max = 100;
      slider.value = Math.round((isLarge ? val / 5 : val) * 100);
      const span = document.createElement("span");
      span.textContent = isLarge ? val.toFixed(0) : val.toFixed(2);
      slider.addEventListener("input", () => {
        const v = isLarge
          ? Math.round((slider.value / 100) * 500)
          : parseFloat((slider.value / 100).toFixed(2));
        span.textContent = isLarge ? v : v.toFixed(2);
        Mono.shader.param(name, key, v);
      });
      container.appendChild(lp);
      container.appendChild(slider);
      container.appendChild(span);
    }

    function makeColor(name, key, val, container) {
      const lp = document.createElement("label");
      lp.textContent = key.replace(/_/g, " ").slice(0, 5) + ":";
      const picker = document.createElement("input");
      picker.type = "color";
      picker.dataset.paramKey = key;
      picker.value = rgbToHex(val);
      picker.addEventListener("input", () => {
        Mono.shader.param(name, key, hexToRgb(picker.value));
      });
      container.appendChild(lp);
      container.appendChild(picker);
    }

    // Row 1: sliders (thickness, pixel_size, etc.)
    if (groups.sliders.length) {
      const row = document.createElement("div");
      row.className = "param-row";
      for (const [key, val] of groups.sliders) makeSlider(name, key, val, row);
      paramsDiv.appendChild(row);
    }

    // Row 2: colors
    if (groups.colors.length) {
      const row = document.createElement("div");
      row.className = "param-row";
      for (const [key, val] of groups.colors) makeColor(name, key, val, row);
      paramsDiv.appendChild(row);
    }
  }

  // --- Add shader row ---
  function addShaderRow(name, enabled) {
    if (enabled === undefined) enabled = true;
    if (uiChain.indexOf(name) !== -1) return; // already in chain

    uiChain.push(name);
    syncChain();
    Mono.shader.enable(name);
    if (!enabled) Mono.shader.disable(name);

    const row = document.createElement("div");
    row.className = "shader-row";
    row.dataset.name = name;
    const handle = document.createElement("span");
    handle.className = "drag-handle";
    handle.textContent = "☰";
    handle.draggable = true;

    const lbl = document.createElement("label");
    lbl.className = "name";
    lbl.textContent = name;

    const paramsDiv = document.createElement("div");
    paramsDiv.className = "shader-params";
    buildParams(name, paramsDiv);

    const buttonsDiv = document.createElement("div");
    buttonsDiv.className = "row-buttons";

    const removeBtn = document.createElement("button");
    removeBtn.className = "btn-remove";
    removeBtn.textContent = "−";
    removeBtn.addEventListener("click", () => {
      Mono.shader.disable(name);
      uiChain = uiChain.filter(n => n !== name);
      syncChain();
      row.remove();
      updateAddSelect();
    });

    const toggleBtn = document.createElement("button");
    toggleBtn.className = enabled ? "btn-toggle on" : "btn-toggle off";
    toggleBtn.textContent = enabled ? "on" : "off";
    if (!enabled) row.classList.add("disabled");
    toggleBtn.addEventListener("click", () => {
      const isOn = toggleBtn.classList.contains("on");
      if (isOn) {
        Mono.shader.disable(name);
        toggleBtn.className = "btn-toggle off";
        toggleBtn.textContent = "off";
        row.classList.add("disabled");
      } else {
        Mono.shader.enable(name);
        toggleBtn.className = "btn-toggle on";
        toggleBtn.textContent = "on";
        row.classList.remove("disabled");
      }
    });

    buttonsDiv.appendChild(removeBtn);
    buttonsDiv.appendChild(toggleBtn);

    row.appendChild(handle);
    row.appendChild(lbl);
    row.appendChild(paramsDiv);
    row.appendChild(buttonsDiv);
    chainUI.appendChild(row);

    // Drag & drop (only from handle)
    handle.addEventListener("dragstart", (e) => {
      row.classList.add("dragging");
      e.dataTransfer.effectAllowed = "move";
      e.dataTransfer.setData("text/plain", name);
    });
    handle.addEventListener("dragend", () => {
      row.classList.remove("dragging");
      chainUI.querySelectorAll(".drag-over").forEach(el => el.classList.remove("drag-over"));
    });
    row.addEventListener("dragover", (e) => {
      e.preventDefault();
      e.dataTransfer.dropEffect = "move";
      const dragging = chainUI.querySelector(".dragging");
      if (dragging !== row) row.classList.add("drag-over");
    });
    row.addEventListener("dragleave", () => {
      row.classList.remove("drag-over");
    });
    row.addEventListener("drop", (e) => {
      e.preventDefault();
      row.classList.remove("drag-over");
      const draggedName = e.dataTransfer.getData("text/plain");
      if (draggedName === name) return;
      // Reorder: move draggedName before this row's name
      const fromIdx = uiChain.indexOf(draggedName);
      const toIdx = uiChain.indexOf(name);
      if (fromIdx === -1 || toIdx === -1) return;
      uiChain.splice(fromIdx, 1);
      uiChain.splice(toIdx, 0, draggedName);
      syncChain();
      // Reorder DOM
      const draggedRow = chainUI.querySelector("[data-name='" + draggedName + "']");
      chainUI.insertBefore(draggedRow, row);
    });

    updateAddSelect();
  }

  // --- Update add dropdown (only show shaders not in chain) ---
  function updateAddSelect() {
    const available = Mono.shader.list().filter(n => uiChain.indexOf(n) === -1);
    addSelect.innerHTML = "";
    for (const name of available) {
      const opt = document.createElement("option");
      opt.value = name;
      opt.textContent = name;
      addSelect.appendChild(opt);
    }
    addBtn.disabled = available.length === 0;
    addSelect.style.display = available.length === 0 ? "none" : "";
  }

  addBtn.addEventListener("click", () => {
    const name = addSelect.value;
    if (name) addShaderRow(name);
  });

  // --- Init defaults ---
  scaleSel.value = "max";
  applyScale();

  addShaderRow("invert_lcd");
  addShaderRow("tint", false);
  addShaderRow("scanlines", false);
  addShaderRow("lcd", false);
  addShaderRow("lcd3d", false);
  addShaderRow("crt", false);

  updateInfo();
  window.addEventListener("resize", updateInfo);
}).catch(e => console.error("Boot failed:", e));
</script>
</body></html>

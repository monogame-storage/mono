<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mono — Shader Test</title>
<link rel="stylesheet" href="../../runtime/mono.css">
<style>
  #controls {
    max-width: 640px;
    margin: 12px auto 0;
    font-family: monospace;
    font-size: 13px;
    color: #aaa;
  }
  .section {
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
    padding: 6px 0;
    border-bottom: 1px solid #333;
  }
  .section:last-child { border-bottom: none; }
  .section-label {
    color: #666;
    font-size: 11px;
    width: 60px;
    flex-shrink: 0;
  }
  #controls select, #controls input[type="range"], #controls input[type="color"], #controls button {
    font-family: monospace;
    font-size: 13px;
    background: #222;
    color: #eee;
    border: 1px solid #555;
    padding: 3px 6px;
    border-radius: 4px;
  }
  #controls label { color: #888; }
  .param-row { display: none; gap: 8px; align-items: center; }
  .param-row.visible { display: flex; }
  #info { text-align: center; font-family: monospace; font-size: 11px; color: #555; margin-top: 6px; }
</style>
</head>
<body>
<div id="frame">
  <canvas id="screen"></canvas>
</div>
<div id="controls">
  <!-- Display -->
  <div class="section">
    <span class="section-label">Display</span>
    <label>Scale:</label>
    <select id="scale-select">
      <option value="max">max integer</option>
      <option value="fit">fit (fractional)</option>
      <option value="3">3x (480x432)</option>
      <option value="4">4x (640x576)</option>
      <option value="5">5x (800x720)</option>
    </select>
  </div>
  <!-- Tint -->
  <div class="section">
    <span class="section-label">Tint</span>
    <div id="param-tint" class="param-row visible">
      <label>tint:</label>
      <select id="tint-select">
        <option value="off">off</option>
        <option value="green">green (Game Boy)</option>
        <option value="amber">amber (retro)</option>
        <option value="blue">blue (cool)</option>
        <option value="custom">custom</option>
      </select>
      <input id="picker-tint" type="color" value="#33ff33" style="display:none">
    </div>
  </div>
  <!-- Shader preset -->
  <div class="section">
    <span class="section-label">Shader</span>
    <label>Shader:</label>
    <select id="shader-select">
      <option value="off">off</option>
      <option value="scanlines">scanlines</option>
      <option value="lcd">lcd grid</option>
      <option value="lcd3d">lcd3d</option>
      <option value="crt">crt</option>
    </select>
    <div id="param-opacity" class="param-row">
      <label>opacity:</label>
      <input id="slider-opacity" type="range" min="0" max="100" value="50">
      <span id="val-opacity">0.5</span>
    </div>
    <div id="param-thickness" class="param-row">
      <label>thickness:</label>
      <input id="slider-thickness" type="range" min="1" max="50" value="8">
      <span id="val-thickness">0.08</span>
    </div>
    <div id="param-gridcolor" class="param-row">
      <label>grid:</label>
      <input id="picker-gridcolor" type="color" value="#000000">
    </div>
    <div id="param-depth" class="param-row">
      <label>depth:</label>
      <input id="slider-depth" type="range" min="0" max="100" value="100">
      <span id="val-depth">1.0</span>
    </div>
    <div id="param-curvature" class="param-row">
      <label>curve:</label>
      <input id="slider-curvature" type="range" min="0" max="100" value="15">
      <span id="val-curvature">0.15</span>
    </div>
    <div id="param-scanline" class="param-row">
      <label>scan:</label>
      <input id="slider-scanline" type="range" min="0" max="100" value="30">
      <span id="val-scanline">0.30</span>
    </div>
    <div id="param-vignette" class="param-row">
      <label>vign:</label>
      <input id="slider-vignette" type="range" min="0" max="100" value="40">
      <span id="val-vignette">0.40</span>
    </div>
  </div>
</div>
<div id="info"></div>
<script src="../../runtime/engine.js"></script>
<script src="../../runtime/shader.js"></script>
<script src="../../runtime/shaders/scanlines.js"></script>
<script src="../../runtime/shaders/lcd.js"></script>
<script src="../../runtime/shaders/lcd3d.js"></script>
<script src="../../runtime/shaders/crt.js"></script>
<script src="../../runtime/shaders/tint.js"></script>
<script>
Mono.boot("screen", { game: "game.lua", colors: 4 }).then(() => {
  const W = 160, H = 144;
  const canvas = document.getElementById("screen");
  const sel = document.getElementById("shader-select");
  const scaleSel = document.getElementById("scale-select");
  const info = document.getElementById("info");

  const paramOpacity = document.getElementById("param-opacity");
  const sliderOpacity = document.getElementById("slider-opacity");
  const valOpacity = document.getElementById("val-opacity");

  const paramThickness = document.getElementById("param-thickness");
  const sliderThickness = document.getElementById("slider-thickness");
  const valThickness = document.getElementById("val-thickness");

  const paramGridColor = document.getElementById("param-gridcolor");
  const pickerGridColor = document.getElementById("picker-gridcolor");

  const paramDepth = document.getElementById("param-depth");
  const sliderDepth = document.getElementById("slider-depth");
  const valDepth = document.getElementById("val-depth");

  const paramCurvature = document.getElementById("param-curvature");
  const sliderCurvature = document.getElementById("slider-curvature");
  const valCurvature = document.getElementById("val-curvature");
  const paramScanline = document.getElementById("param-scanline");
  const sliderScanline = document.getElementById("slider-scanline");
  const valScanline = document.getElementById("val-scanline");
  const paramVignette = document.getElementById("param-vignette");
  const sliderVignette = document.getElementById("slider-vignette");
  const valVignette = document.getElementById("val-vignette");

  const tintSelect = document.getElementById("tint-select");
  const pickerTint = document.getElementById("picker-tint");

  const TINT_PRESETS = {
    green: [0.6, 0.9, 0.3],
    amber: [1.0, 0.75, 0.3],
    blue:  [0.4, 0.6, 1.0],
  };

  // Chain order: tint → lcd/lcd3d/scanlines → crt
  Mono.shader.order(["tint", "scanlines", "lcd", "lcd3d", "crt"]);
  let currentShader = null;

  function updateInfo() {
    const dw = parseInt(canvas.style.width) || W;
    const dh = parseInt(canvas.style.height) || H;
    const sx = (dw / W).toFixed(2);
    const sy = (dh / H).toFixed(2);
    const isInt = (dw % W === 0 && dh % H === 0);
    info.textContent = `display: ${dw}x${dh}  scale: ${sx}x${sy}  ${isInt ? "integer" : "fractional"}`;
  }

  function maxIntegerScale() {
    const maxW = window.innerWidth - 40;
    const maxH = window.innerHeight - 100;
    return Math.max(1, Math.floor(Math.min(maxW / W, maxH / H)));
  }

  function applyScale() {
    const val = scaleSel.value;
    let s;
    if (val === "fit") {
      const maxW = window.innerWidth - 40;
      const maxH = window.innerHeight - 100;
      s = Math.min(maxW / W, maxH / H);
    } else if (val === "max") {
      s = maxIntegerScale();
    } else {
      s = parseInt(val);
    }
    canvas.style.width = (W * s) + "px";
    canvas.style.height = (H * s) + "px";
    updateInfo();
  }

  function applyShader() {
    const name = sel.value;
    paramOpacity.className = "param-row";
    paramThickness.className = "param-row";
    paramGridColor.className = "param-row";
    paramDepth.className = "param-row";
    paramCurvature.className = "param-row";
    paramScanline.className = "param-row";
    paramVignette.className = "param-row";

    if (currentShader) Mono.shader.disable(currentShader);
    currentShader = null;

    if (name === "off") {
      updateInfo();
      return;
    }

    Mono.shader.enable(name);
    currentShader = name;

    if (name === "scanlines") {
      paramOpacity.className = "param-row visible";
      sliderOpacity.value = 40;
      valOpacity.textContent = "0.4";
    } else if (name === "lcd") {
      paramOpacity.className = "param-row visible";
      paramThickness.className = "param-row visible";
      paramGridColor.className = "param-row visible";
      sliderOpacity.value = 100;
      valOpacity.textContent = "1.0";
      sliderThickness.value = 20;
      valThickness.textContent = "0.20";
      pickerGridColor.value = "#000000";
    } else if (name === "lcd3d") {
      paramOpacity.className = "param-row visible";
      paramThickness.className = "param-row visible";
      paramGridColor.className = "param-row visible";
      paramDepth.className = "param-row visible";
      sliderOpacity.value = 100;
      valOpacity.textContent = "1.0";
      sliderThickness.value = 20;
      valThickness.textContent = "0.20";
      sliderDepth.value = 100;
      valDepth.textContent = "1.0";
      pickerGridColor.value = "#000000";
    } else if (name === "crt") {
      paramCurvature.className = "param-row visible";
      paramScanline.className = "param-row visible";
      paramVignette.className = "param-row visible";
      sliderCurvature.value = 15;
      valCurvature.textContent = "0.15";
      sliderScanline.value = 30;
      valScanline.textContent = "0.30";
      sliderVignette.value = 40;
      valVignette.textContent = "0.40";
    }
    updateInfo();
  }

  sel.addEventListener("change", applyShader);
  scaleSel.addEventListener("change", applyScale);

  sliderOpacity.addEventListener("input", () => {
    const v = (sliderOpacity.value / 100).toFixed(2);
    valOpacity.textContent = v;
    if (currentShader) Mono.shader.param(currentShader, "opacity", parseFloat(v));
  });

  sliderThickness.addEventListener("input", () => {
    const v = (sliderThickness.value / 100).toFixed(2);
    valThickness.textContent = v;
    if (currentShader) Mono.shader.param(currentShader, "thickness", parseFloat(v));
  });

  sliderCurvature.addEventListener("input", () => {
    const v = (sliderCurvature.value / 100).toFixed(2);
    valCurvature.textContent = v;
    if (currentShader) Mono.shader.param(currentShader, "curvature", parseFloat(v));
  });
  sliderScanline.addEventListener("input", () => {
    const v = (sliderScanline.value / 100).toFixed(2);
    valScanline.textContent = v;
    if (currentShader) Mono.shader.param(currentShader, "scanline", parseFloat(v));
  });
  sliderVignette.addEventListener("input", () => {
    const v = (sliderVignette.value / 100).toFixed(2);
    valVignette.textContent = v;
    if (currentShader) Mono.shader.param(currentShader, "vignette", parseFloat(v));
  });

  sliderDepth.addEventListener("input", () => {
    const v = (sliderDepth.value / 100).toFixed(1);
    valDepth.textContent = v;
    if (currentShader) Mono.shader.param(currentShader, "depth", parseFloat(v));
  });

  tintSelect.addEventListener("change", () => {
    const val = tintSelect.value;
    if (val === "off") {
      Mono.shader.tint(null);
      pickerTint.style.display = "none";
    } else if (val === "custom") {
      pickerTint.style.display = "";
      const hex = pickerTint.value;
      const r = parseInt(hex.slice(1,3), 16) / 255;
      const g = parseInt(hex.slice(3,5), 16) / 255;
      const b = parseInt(hex.slice(5,7), 16) / 255;
      Mono.shader.tint([r, g, b]);
    } else {
      pickerTint.style.display = "none";
      Mono.shader.tint(TINT_PRESETS[val]);
    }
  });

  pickerTint.addEventListener("input", () => {
    const hex = pickerTint.value;
    const r = parseInt(hex.slice(1,3), 16) / 255;
    const g = parseInt(hex.slice(3,5), 16) / 255;
    const b = parseInt(hex.slice(5,7), 16) / 255;
    Mono.shader.tint([r, g, b]);
  });

  pickerGridColor.addEventListener("input", () => {
    const hex = pickerGridColor.value;
    const r = parseInt(hex.slice(1,3), 16) / 255;
    const g = parseInt(hex.slice(3,5), 16) / 255;
    const b = parseInt(hex.slice(5,7), 16) / 255;
    if (currentShader) Mono.shader.param(currentShader, "grid_color", [r, g, b]);
  });

  // Default: lcd grid + max integer scale
  scaleSel.value = "max";
  applyScale();
  sel.value = "lcd3d";
  applyShader();

  updateInfo();
  window.addEventListener("resize", updateInfo);
}).catch(e => console.error("Boot failed:", e));
</script>
</body></html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mono — Demo: Tower Defense</title>
<link rel="stylesheet" href="../../runtime/mono.css">
</head>
<body>
<div id="frame">
  <canvas id="screen"></canvas>
</div>
<div id="controls">
  <span>ARROWS</span> CURSOR &nbsp;&nbsp; <span>A</span> PLACE TOWER &nbsp;&nbsp; <span>B</span> CYCLE TYPE
</div>
<script src="../../runtime/engine.js"></script>
<script>
(() => {
  "use strict";
  const W = Mono.WIDTH, H = Mono.HEIGHT;
  const { cls, pix, line, rect, rectf, circ, circf, sprite: defSprite,
          spr, text, btn, btnp, note, stop, rnd, flr, abs: _abs,
          min, max: _max, sin, cos } = Mono;

  // --- 8→16 upscale helper ---
  function up(d) {
    let o = "";
    for (let r = 0; r < 8; r++) {
      let row = "";
      for (let c = 0; c < 8; c++) {
        const ch = d[r * 8 + c];
        row += ch + ch;
      }
      o += row + row;
    }
    return o;
  }

  // --- Circle collision helper ---
  function circCollide(x1, y1, r1, x2, y2, r2) {
    const dx = x1 - x2, dy = y1 - y2;
    const dist = dx * dx + dy * dy;
    const rSum = r1 + r2;
    return dist < rSum * rSum;
  }

  // --- Constants ---
  const CELL = 16; // grid cell size (matches 16x16 sprites)
  const GRID_W = 20; // 320 / 16
  const GRID_H = 12; // 192 / 16 (leave room for HUD top + bottom)
  const HUD_TOP = 16;
  const GRID_OX = 0;
  const GRID_OY = HUD_TOP;
  const HUD_BOTTOM_H = 32;
  const MAX_WAVES = 20;

  // Tower types: 0=basic, 1=sniper, 2=rapid
  const TOWER_TYPES = [
    { name: "BASIC",  cost: 10, range: 48, rate: 20, dmg: 1, color: 3, sprId: 20 },
    { name: "SNIPER", cost: 20, range: 96, rate: 50, dmg: 3, color: 2, sprId: 21 },
    { name: "RAPID",  cost: 15, range: 32, rate: 8,  dmg: 1, color: 3, sprId: 22 },
  ];

  // --- Path definition (grid coords) ---
  const PATH = [
    {x:0,y:2},{x:1,y:2},{x:2,y:2},{x:3,y:2},{x:4,y:2},{x:5,y:2},
    {x:5,y:3},{x:5,y:4},{x:5,y:5},{x:5,y:6},
    {x:6,y:6},{x:7,y:6},{x:8,y:6},{x:9,y:6},
    {x:9,y:5},{x:9,y:4},{x:9,y:3},{x:9,y:2},{x:9,y:1},
    {x:10,y:1},{x:11,y:1},{x:12,y:1},{x:13,y:1},
    {x:13,y:2},{x:13,y:3},{x:13,y:4},{x:13,y:5},{x:13,y:6},{x:13,y:7},{x:13,y:8},{x:13,y:9},
    {x:14,y:9},{x:15,y:9},{x:16,y:9},
    {x:16,y:8},{x:16,y:7},{x:16,y:6},{x:16,y:5},{x:16,y:4},
    {x:17,y:4},{x:18,y:4},{x:19,y:4},
  ];

  // Build a set for fast path lookup
  const pathSet = new Set();
  for (const p of PATH) pathSet.add(p.x + "," + p.y);

  // --- Sprites (8x8 art upscaled to 16x16) ---
  // 20: Basic tower
  defSprite(20, up(
    "00033000" +
    "00333300" +
    "03322330" +
    "03322330" +
    "03333330" +
    "03333330" +
    "00333300" +
    "01111110"
  ));
  // 21: Sniper tower (tall, thin barrel)
  defSprite(21, up(
    "00033300" +
    "00020000" +
    "00020000" +
    "00222000" +
    "02222200" +
    "02211220" +
    "02222200" +
    "01111110"
  ));
  // 22: Rapid tower (wide, multiple barrels)
  defSprite(22, up(
    "03300330" +
    "03300330" +
    "03333330" +
    "33333333" +
    "33322333" +
    "33322333" +
    "03333330" +
    "01111110"
  ));
  // 30: Basic enemy (small walker)
  defSprite(30, up(
    "00000000" +
    "00111100" +
    "01233210" +
    "01333310" +
    "01333310" +
    "00133100" +
    "00100100" +
    "00000000"
  ));
  // 31: Fast enemy
  defSprite(31, up(
    "00000000" +
    "00322300" +
    "03222230" +
    "32222223" +
    "32222223" +
    "03222230" +
    "00322300" +
    "00000000"
  ));
  // 32: Tank enemy (big, slow)
  defSprite(32, up(
    "01111110" +
    "13333331" +
    "13322331" +
    "13333331" +
    "13333331" +
    "13322331" +
    "13333331" +
    "01111110"
  ));
  // 33: Bullet (not used as spr anymore, drawn as filled rect)
  defSprite(33, up(
    "00000000" +
    "00000000" +
    "00000000" +
    "00033000" +
    "00033000" +
    "00000000" +
    "00000000" +
    "00000000"
  ));
  // 34: Cursor (not used as spr, drawn procedurally)
  defSprite(34, up(
    "33333333" +
    "30000003" +
    "30000003" +
    "30000003" +
    "30000003" +
    "30000003" +
    "30000003" +
    "33333333"
  ));
  // 35: Heart/life icon
  defSprite(35, up(
    "00000000" +
    "03303300" +
    "33333330" +
    "33333330" +
    "03333300" +
    "00333000" +
    "00030000" +
    "00000000"
  ));

  // --- Collision radii (for 16x16 sprites) ---
  const ENEMY_R = [5, 5, 7]; // basic, fast, tank
  const BULLET_R = 3;
  const TOWER_R = 6;

  // --- Scenes ---
  const { TITLE, PLAY, GAMEOVER } = Mono.SCENE;

  let grid; // 2D array: 0=empty, -1=path, >0=tower index+1
  let towers, enemies, bullets, particles;
  let cursorX, cursorY, selectedType;
  let gold, score, lives;
  let wave, waveTimer, waveActive, waveEnemiesLeft, waveSpawnTimer, waveSpawnCount;
  let waveMessage, waveMessageTimer;
  let gameWon;

  function resetGame() {
    grid = [];
    for (let y = 0; y < GRID_H; y++) {
      grid[y] = [];
      for (let x = 0; x < GRID_W; x++) {
        grid[y][x] = pathSet.has(x + "," + y) ? -1 : 0;
      }
    }
    towers = [];
    enemies = [];
    bullets = [];
    particles = [];
    cursorX = 10;
    cursorY = 5;
    selectedType = 0;
    gold = 40;
    score = 0;
    lives = 10;
    wave = 0;
    waveTimer = 0;
    waveActive = false;
    waveEnemiesLeft = 0;
    waveSpawnTimer = 0;
    waveSpawnCount = 0;
    waveMessage = "";
    waveMessageTimer = 0;
    gameWon = false;
    startNextWave();
  }

  function startNextWave() {
    wave++;
    if (wave > MAX_WAVES) {
      gameWon = true;
      Mono.go(GAMEOVER);
      return;
    }
    waveActive = true;
    waveSpawnCount = 5 + wave * 2;
    waveEnemiesLeft = waveSpawnCount;
    waveSpawnTimer = 0;
    waveMessage = "WAVE " + wave;
    waveMessageTimer = 60;
  }

  function spawnEnemy() {
    let type = 0;
    let r = Math.random();
    if (wave >= 5 && r < 0.3) type = 1;
    if (wave >= 8 && r < 0.15) type = 2;
    if (wave >= 12 && r < 0.25) type = 2;

    const baseHp = [3, 2, 10];
    const baseSpeed = [0.02, 0.04, 0.012];
    const hpScale = 1 + (wave - 1) * 0.4;

    enemies.push({
      type: type,
      pathIdx: 0,
      hp: flr(baseHp[type] * hpScale),
      maxHp: flr(baseHp[type] * hpScale),
      speed: baseSpeed[type] + wave * 0.001,
      x: PATH[0].x * CELL + GRID_OX,
      y: PATH[0].y * CELL + GRID_OY,
      reward: [2, 3, 5][type] + flr(wave / 3),
      points: [10, 15, 30][type],
      sprId: 30 + type,
      hitFlash: 0,
    });
  }

  function dist(x1, y1, x2, y2) {
    const dx = x1 - x2, dy = y1 - y2;
    return Math.sqrt(dx * dx + dy * dy);
  }

  function addParticles(x, y, count, col) {
    for (let i = 0; i < count; i++) {
      particles.push({
        x: x, y: y,
        vx: rnd(3) - 1.5, vy: rnd(3) - 1.5,
        life: 8 + flr(rnd(12)),
        color: col || (flr(rnd(3)) + 1),
      });
    }
  }

  // --- Sounds ---
  function sndPlace() { note(0, "E5", 0.05); setTimeout(() => note(0, "G5", 0.06), 50); }
  function sndShoot() { note(1, "A5", 0.02); }
  function sndKill() { note(0, "C4", 0.04); setTimeout(() => note(0, "E4", 0.04), 40); }
  function sndLeak() { note(0, "C3", 0.1); note(1, "G2", 0.1); }
  function sndWave() {
    note(0, "C5", 0.08);
    setTimeout(() => note(0, "E5", 0.08), 80);
    setTimeout(() => note(0, "G5", 0.12), 160);
  }
  function sndError() { note(0, "C3", 0.08); }
  function sndWin() {
    note(0, "C5", 0.1); setTimeout(() => note(0, "E5", 0.1), 120);
    setTimeout(() => note(0, "G5", 0.1), 240); setTimeout(() => note(0, "C6", 0.2), 360);
  }
  function sndCycle() { note(1, "E5", 0.03); }

  // --- Helper: center of a 16x16 sprite placed at (x,y) ---
  function sprCx(x) { return x + 8; }
  function sprCy(y) { return y + 8; }

  // --- Title Scene ---
  Mono.scene(TITLE, {
    init() { resetGame(); },
    update() {
      if (btnp("start") || btnp("a")) { sndWave(); Mono.go(PLAY); return; }
    },
    draw() {
      cls(0);
      const ty = 30 + sin(Mono.frame * 0.04) * 3;
      text("TOWER DEFENSE", 112, flr(ty), 3);
      rectf(107, flr(ty) + 9, 107, 1, 2);

      const bx = 104; const by = flr(ty) + 20;
      spr(20, bx, by + flr(sin(Mono.frame * 0.06) * 2));
      spr(21, bx + 40, by + flr(sin(Mono.frame * 0.06 + 1.5) * 2));
      spr(22, bx + 80, by + flr(sin(Mono.frame * 0.06 + 3) * 2));

      for (let i = 0; i < 5; i++) {
        const ex = 80 + i * 36 + sin(Mono.frame * 0.05 + i) * 6;
        const ey = flr(ty) + 48 + sin(Mono.frame * 0.08 + i * 0.7) * 3;
        spr(30 + (i % 3), flr(ex), flr(ey));
      }

      if (flr(Mono.frame / 20) % 2 === 0) text("PRESS START", 113, 120, 3);

      text("-- TOWERS --", 124, 140, 2);
      spr(20, 100, 152); text("BASIC   10G  MED RANGE", 118, 157, 2);
      spr(21, 100, 170); text("SNIPER  20G  LONG RANGE", 118, 175, 2);
      spr(22, 100, 188); text("RAPID   15G  SHORT RANGE", 118, 193, 2);

      text("SURVIVE 20 WAVES!", 117, 216, 3);
      text("MONO DEMO V0.2", 112, 231, 1);
    }
  });

  // --- Game Over Scene ---
  Mono.scene(GAMEOVER, {
    init() {},
    update() {
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx; p.y += p.vy; p.vy += 0.06; p.life--;
        if (p.life <= 0) particles.splice(i, 1);
      }
      if (btnp("start") || btnp("a")) { Mono.go(TITLE); return; }
    },
    draw() {
      cls(0);
      for (const p of particles) pix(flr(p.x), flr(p.y), p.color);
      if (gameWon) {
        text("VICTORY!", 133, 75, 3);
        text("ALL 20 WAVES CLEARED!", 108, 94, 2);
      } else {
        text("GAME OVER", 130, 75, 3);
        text("REACHED WAVE " + wave, 122, 94, 2);
      }
      text("SCORE: " + score, 130, 113, 2);
      text("TOWERS BUILT: " + towers.length, 117, 124, 1);
      if (flr(Mono.frame / 20) % 2 === 0) text("PRESS START", 105, 158, 3);
    }
  });

  // --- Play Scene ---
  Mono.scene(PLAY, {
    init() { resetGame(); },
    update() {

    // Cursor movement
    if (btnp("up")) cursorY = _max(0, cursorY - 1);
    if (btnp("down")) cursorY = min(GRID_H - 1, cursorY + 1);
    if (btnp("left")) cursorX = _max(0, cursorX - 1);
    if (btnp("right")) cursorX = min(GRID_W - 1, cursorX + 1);

    // Cycle tower type
    if (btnp("b")) {
      selectedType = (selectedType + 1) % TOWER_TYPES.length;
      sndCycle();
    }

    // Place tower
    if (btnp("a")) {
      const tt = TOWER_TYPES[selectedType];
      if (grid[cursorY][cursorX] === 0 && gold >= tt.cost) {
        grid[cursorY][cursorX] = towers.length + 1;
        towers.push({
          type: selectedType,
          gx: cursorX,
          gy: cursorY,
          x: cursorX * CELL + GRID_OX + 8,
          y: cursorY * CELL + GRID_OY + 8,
          cooldown: 0,
          angle: 0,
          target: null,
        });
        gold -= tt.cost;
        sndPlace();
      } else {
        sndError();
      }
    }

    // Wave message timer
    if (waveMessageTimer > 0) waveMessageTimer--;

    // Spawn enemies
    if (waveActive && waveEnemiesLeft > 0) {
      waveSpawnTimer--;
      if (waveSpawnTimer <= 0) {
        spawnEnemy();
        waveEnemiesLeft--;
        waveSpawnTimer = _max(8, 30 - wave);
      }
    }

    // Update enemies along path
    for (let i = enemies.length - 1; i >= 0; i--) {
      const e = enemies[i];
      e.pathIdx += e.speed;
      if (e.hitFlash > 0) e.hitFlash--;

      const idx = flr(e.pathIdx);
      if (idx >= PATH.length - 1) {
        lives--;
        sndLeak();
        addParticles(sprCx(e.x), sprCy(e.y), 6, 1);
        enemies.splice(i, 1);
        if (lives <= 0) {
          gameWon = false;
          Mono.go(GAMEOVER); return;
        }
        continue;
      }

      const frac = e.pathIdx - idx;
      const p0 = PATH[idx];
      const p1 = PATH[min(idx + 1, PATH.length - 1)];
      e.x = (p0.x + (p1.x - p0.x) * frac) * CELL + GRID_OX;
      e.y = (p0.y + (p1.y - p0.y) * frac) * CELL + GRID_OY;
    }

    // Tower AI
    for (const t of towers) {
      const tt = TOWER_TYPES[t.type];
      t.cooldown = _max(0, t.cooldown - 1);

      // Find nearest enemy in range (use center-to-center distance)
      let nearest = null;
      let nearDist = Infinity;
      for (const e of enemies) {
        const eCx = sprCx(e.x), eCy = sprCy(e.y);
        const d = dist(t.x, t.y, eCx, eCy);
        if (d <= tt.range && d < nearDist) {
          nearest = e;
          nearDist = d;
        }
      }

      t.target = nearest;

      if (nearest) {
        const eCx = sprCx(nearest.x), eCy = sprCy(nearest.y);
        t.angle = Math.atan2(eCy - t.y, eCx - t.x);

        if (t.cooldown <= 0) {
          t.cooldown = tt.rate;
          const speed = t.type === 1 ? 6 : 4;
          const dx = eCx - t.x;
          const dy = eCy - t.y;
          const d = Math.sqrt(dx * dx + dy * dy) || 1;
          bullets.push({
            x: t.x, y: t.y,
            vx: dx / d * speed,
            vy: dy / d * speed,
            dmg: tt.dmg,
            life: 30,
          });
          sndShoot();
        }
      }
    }

    // Update bullets — circle collision with enemies
    for (let i = bullets.length - 1; i >= 0; i--) {
      const b = bullets[i];
      b.x += b.vx;
      b.y += b.vy;
      b.life--;
      if (b.life <= 0 || b.x < 0 || b.x > W || b.y < 0 || b.y > H) {
        bullets.splice(i, 1);
        continue;
      }

      // Circle collision: bullet vs enemies
      for (let j = enemies.length - 1; j >= 0; j--) {
        const e = enemies[j];
        const eCx = sprCx(e.x), eCy = sprCy(e.y);
        const eR = ENEMY_R[e.type];
        if (circCollide(b.x, b.y, BULLET_R, eCx, eCy, eR)) {
          e.hp -= b.dmg;
          e.hitFlash = 4;
          bullets.splice(i, 1);
          if (e.hp <= 0) {
            score += e.points;
            gold += e.reward;
            addParticles(eCx, eCy, 10, 3);
            sndKill();
            enemies.splice(j, 1);
          }
          break;
        }
      }
    }

    // Update particles
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx; p.y += p.vy; p.vy += 0.05; p.life--;
      if (p.life <= 0) particles.splice(i, 1);
    }

    // Check wave complete
    if (waveActive && waveEnemiesLeft <= 0 && enemies.length === 0) {
      waveActive = false;
      waveTimer = 90;
      gold += 5 + wave * 2;
      if (wave >= MAX_WAVES) {
        gameWon = true;
        sndWin();
        Mono.go(GAMEOVER); return;
      }
    }

    // Countdown to next wave
    if (!waveActive) {
      waveTimer--;
      if (waveTimer <= 0) { startNextWave(); sndWave(); }
    }
    },
    draw() {
      cls(0);

      // --- Grid background ---
      for (let gy = 0; gy < GRID_H; gy++) {
        for (let gx = 0; gx < GRID_W; gx++) {
          const px = gx * CELL + GRID_OX;
          const py = gy * CELL + GRID_OY;
          if (grid[gy][gx] === 0 && (gx + gy) % 2 === 0) pix(px + 8, py + 8, 1);
        }
      }

      // --- Path ---
      for (let i = 0; i < PATH.length; i++) {
        const p = PATH[i];
        rectf(p.x * CELL + GRID_OX, p.y * CELL + GRID_OY, CELL, CELL, 1);
      }
      // Path direction dots
      for (let i = 0; i < PATH.length - 1; i += 3) {
        const p = PATH[i];
        const pn = PATH[i + 1];
        const cx = p.x * CELL + GRID_OX + 8;
        const cy = p.y * CELL + GRID_OY + 8;
        const dx = pn.x - p.x;
        const dy = pn.y - p.y;
        pix(cx + dx * 4, cy + dy * 4, 2);
        pix(cx + dx * 5, cy + dy * 5, 2);
      }
      // Start / End labels
      const ps = PATH[0]; const pe = PATH[PATH.length - 1];
      text("IN", ps.x * CELL + GRID_OX + 2, ps.y * CELL + GRID_OY + 5, 3);
      text("END", pe.x * CELL + GRID_OX, pe.y * CELL + GRID_OY + 5, 3);

      // --- Towers ---
      for (const t of towers) {
        const tt = TOWER_TYPES[t.type];
        spr(tt.sprId, t.gx * CELL + GRID_OX, t.gy * CELL + GRID_OY);
        // Barrel direction line
        if (t.target) {
          const lx = t.x + cos(t.angle) * 10;
          const ly = t.y + sin(t.angle) * 10;
          line(t.x, t.y, flr(lx), flr(ly), 2);
        }
        // Show range ring when cursor is on tower
        if (cursorX === t.gx && cursorY === t.gy) circ(t.x, t.y, tt.range, 1);
        // Debug: tower hitbox
        Mono.dbgC(t.x, t.y, TOWER_R);
      }

      // --- Enemies ---
      for (const e of enemies) {
        const ex = flr(e.x), ey = flr(e.y);
        const eCx = sprCx(e.x), eCy = sprCy(e.y);

        // Shadow
        rectf(ex + 3, ey + 14, 10, 2, 1);

        // Sprite or flash
        if (e.hitFlash > 0) {
          rectf(ex, ey, 16, 16, 3);
        } else {
          spr(e.sprId, ex, ey);
        }

        // HP bar
        const hpW = 14;
        const hpX = ex + 1;
        const hpY = ey - 3;
        const hpFill = (e.hp / e.maxHp) * hpW;
        rectf(hpX, hpY, hpW, 2, 1);
        if (hpFill > 0) {
          const hpColor = e.hp > e.maxHp * 0.5 ? 3 : 2;
          rectf(hpX, hpY, flr(hpFill), 2, hpColor);
        }

        // Debug: enemy hitbox circle
        Mono.dbgC(eCx, eCy, ENEMY_R[e.type]);
      }

      // --- Bullets ---
      for (const b of bullets) {
        rectf(flr(b.x) - 1, flr(b.y) - 1, 3, 3, 3);
        // Debug: bullet hitbox circle
        Mono.dbgC(flr(b.x), flr(b.y), BULLET_R);
      }

      // --- Particles ---
      for (const p of particles) pix(flr(p.x), flr(p.y), p.color);

      // --- Cursor ---
      const curPx = cursorX * CELL + GRID_OX;
      const curPy = cursorY * CELL + GRID_OY;
      const curBlink = flr(Mono.frame / 4) % 2;
      const curCol = curBlink ? 3 : 2;
      // Corner brackets (16x16 cell)
      line(curPx, curPy, curPx + 5, curPy, curCol);
      line(curPx, curPy, curPx, curPy + 5, curCol);
      line(curPx + CELL - 1, curPy, curPx + CELL - 6, curPy, curCol);
      line(curPx + CELL - 1, curPy, curPx + CELL - 1, curPy + 5, curCol);
      line(curPx, curPy + CELL - 1, curPx + 5, curPy + CELL - 1, curCol);
      line(curPx, curPy + CELL - 1, curPx, curPy + CELL - 6, curCol);
      line(curPx + CELL - 1, curPy + CELL - 1, curPx + CELL - 6, curPy + CELL - 1, curCol);
      line(curPx + CELL - 1, curPy + CELL - 1, curPx + CELL - 1, curPy + CELL - 6, curCol);

      // Preview tower + range circle if empty cell
      if (grid[cursorY][cursorX] === 0) {
        const tt = TOWER_TYPES[selectedType];
        circ(curPx + CELL / 2, curPy + CELL / 2, tt.range, 1);
        if (gold >= tt.cost) spr(tt.sprId, curPx, curPy);
      }

      // --- Top HUD ---
      rectf(0, 0, W, HUD_TOP, 0);
      line(0, HUD_TOP - 1, W, HUD_TOP - 1, 1);
      text("GOLD:" + gold, 3, 4, 3);
      text("SCORE:" + score, 67, 4, 2);
      text("WAVE:" + wave + "/" + MAX_WAVES, 140, 4, 2);
      for (let i = 0; i < min(lives, 10); i++) spr(35, W - 18 - i * 17, 0);

      // --- Bottom HUD ---
      const bottomY = H - HUD_BOTTOM_H;
      rectf(0, bottomY, W, HUD_BOTTOM_H, 0);
      line(0, bottomY, W, bottomY, 1);

      const st = TOWER_TYPES[selectedType];
      for (let i = 0; i < TOWER_TYPES.length; i++) {
        const tx = 5 + i * 60;
        const ty = bottomY + 4;
        if (i === selectedType) rect(tx - 2, ty - 2, 56, 28, 3);
        spr(TOWER_TYPES[i].sprId, tx, ty + 2);
        text(TOWER_TYPES[i].name, tx + 18, ty + 1, i === selectedType ? 3 : 1);
        text(TOWER_TYPES[i].cost + "G", tx + 18, ty + 10, i === selectedType ? 2 : 1);
        text("R" + TOWER_TYPES[i].range, tx + 18, ty + 18, 1);
      }
      text("A:PLACE", 200, bottomY + 4, 1);
      text("B:CYCLE", 200, bottomY + 13, 1);
      text("DMG:" + st.dmg + " RNG:" + st.range, 200, bottomY + 22, 1);
      if (gold < st.cost) text("NO GOLD!", 260, bottomY + 4, 2);

      // --- Wave message overlay ---
      if (waveMessageTimer > 0) {
        const msgY = 105 + sin(waveMessageTimer * 0.1) * 3;
        const msgX = 133;
        rectf(msgX - 22, flr(msgY) - 5, 97, 16, 0);
        rect(msgX - 22, flr(msgY) - 5, 97, 16, 2);
        text(waveMessage, msgX, flr(msgY), 3);
        if (waveMessageTimer > 30) text("GET READY!", msgX - 5, flr(msgY) + 9, 2);
      }

      // --- Next wave countdown ---
      if (!waveActive && waveTimer > 0 && enemies.length === 0 && wave < MAX_WAVES) {
        const sec = flr(waveTimer / 30) + 1;
        text("NEXT WAVE IN " + sec, 122, 105, 2);
        text("BONUS: +" + (5 + wave * 2) + "G", 128, 114, 1);
      }
    }
  });

  Mono.go(TITLE);
  Mono.boot("screen");
})();
</script>
</body>
</html>

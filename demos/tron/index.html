<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mono — Demo: Tron Light Cycles</title>
<link rel="stylesheet" href="../../runtime/mono.css">
</head>
<body>
<div id="frame">
  <canvas id="screen"></canvas>
</div>
<div id="controls">
  <span>ARROWS</span> TURN &nbsp;&nbsp; <span>A</span> BOOST
</div>
<script src="../../runtime/engine.js"></script>
<script>
(() => {
  "use strict";
  const W = Mono.WIDTH, H = Mono.HEIGHT;
  const { cls, pix, line, rect, rectf, circ, circf, sprite: defSprite,
          spr, sprT, text, btn, btnp, note, stop, rnd, flr, abs: _abs,
          min, max: _max, sin, cos, gpix, dbg, dbgC, overlap } = Mono;

  // --- Low-level access for fast trail rendering ---
  const COLOR_U32 = Mono._COLOR_U32;
  const getBuf32 = () => Mono._buf32;

  // --- 8x8 -> 16x16 upscale helper ---
  function up(d) {
    let o = "";
    for (let r = 0; r < 8; r++) {
      let row = "";
      for (let c = 0; c < 8; c++) {
        const ch = d[r * 8 + c];
        row += ch + ch;
      }
      o += row + row;
    }
    return o;
  }

  // --- Sprites (8x8 designs, upscaled to 16x16) ---

  // 1: Player cycle facing right
  defSprite(1, up(
    "00000000" +
    "00333300" +
    "03333330" +
    "33322330" +
    "33333330" +
    "03333300" +
    "00333000" +
    "00000000"
  ));
  // 2: AI cycle
  defSprite(2, up(
    "00000000" +
    "00111100" +
    "01111110" +
    "11122110" +
    "11111110" +
    "01111100" +
    "00111000" +
    "00000000"
  ));
  // 3: Explosion frame 1
  defSprite(3, up(
    "00000000" +
    "00200100" +
    "01002000" +
    "00031000" +
    "00130200" +
    "01000010" +
    "00100000" +
    "00000000"
  ));
  // 4: Explosion frame 2
  defSprite(4, up(
    "20010020" +
    "01000010" +
    "00203200" +
    "03033030" +
    "00232000" +
    "01000300" +
    "20001001" +
    "00200010"
  ));
  // 5: Crown/trophy
  defSprite(5, up(
    "00000000" +
    "30300300" +
    "33333330" +
    "33333330" +
    "03333300" +
    "03333300" +
    "03333300" +
    "00000000"
  ));
  // 6: Boost icon
  defSprite(6, up(
    "00000000" +
    "00030000" +
    "00330000" +
    "03330000" +
    "00330000" +
    "00030000" +
    "00000000" +
    "00000000"
  ));

  // --- Arena constants (fits 320x240 with HUD) ---
  const ARENA_X = 5;
  const ARENA_Y = 16;
  const ARENA_W = W - 10;   // 310
  const ARENA_H = H - 22;   // 218
  const ARENA_R = ARENA_X + ARENA_W - 1;
  const ARENA_B = ARENA_Y + ARENA_H - 1;

  // --- Direction helpers ---
  // 0=up, 1=right, 2=down, 3=left
  const DX = [0, 1, 0, -1];
  const DY = [-1, 0, 1, 0];

  // --- Grid for trail collision (1px resolution within arena) ---
  let grid; // Uint8Array: 0=empty, 1=player trail, 2+=AI trails

  function gridIdx(x, y) {
    return (y - ARENA_Y) * ARENA_W + (x - ARENA_X);
  }
  function gridGet(x, y) {
    if (x < ARENA_X || x > ARENA_R || y < ARENA_Y || y > ARENA_B) return 255;
    return grid[gridIdx(x, y)];
  }
  function gridSet(x, y, v) {
    if (x >= ARENA_X && x <= ARENA_R && y >= ARENA_Y && y <= ARENA_B)
      grid[gridIdx(x, y)] = v;
  }

  // --- Collision: check a rect region of the grid ---
  function gridRectHit(cx, cy, hw, hh, ownId) {
    for (let dy = -hh; dy <= hh; dy++) {
      for (let dx = -hw; dx <= hw; dx++) {
        const gx = cx + dx;
        const gy = cy + dy;
        const v = gridGet(gx, gy);
        if (v === 255) return true; // wall
        if (v !== 0 && v !== ownId) return true; // other trail
      }
    }
    return false;
  }

  // --- Stamp a rect region in the grid ---
  function gridRectSet(cx, cy, hw, hh, v) {
    for (let dy = -hh; dy <= hh; dy++) {
      for (let dx = -hw; dx <= hw; dx++) {
        gridSet(cx + dx, cy + dy, v);
      }
    }
  }

  // --- Scenes ---
  const { TITLE, PLAY, GAMEOVER } = Mono.SCENE;
  const ROUNDEND = "roundend";
  let round, playerScore, aiScore, winsNeeded;
  let cycles; // array of cycle objects
  let explosions, particles;
  let roundTimer, roundMessage;
  let baseSpeed, speedIncrement;
  let numAI;
  let boostFuel, boostMax, boostActive, boostCooldown;
  let titlePulse;
  let crashedIds; // set of crashed cycle indices this round

  // Cycle head half-sizes for collision
  const CYCLE_HW = 1; // half width
  const CYCLE_HH = 1; // half height

  function makeCycle(id, x, y, dir, isPlayer, color) {
    return {
      id, x, y, dir, isPlayer, color,
      alive: true, speed: 1, trail: [],
      moveAccum: 0,
      turnCooldown: 0
    };
  }

  function resetGrid() {
    grid = new Uint8Array(ARENA_W * ARENA_H);
  }

  function spawnPositions(count) {
    const positions = [];
    const cx = flr(ARENA_X + ARENA_W / 2);
    const cy = flr(ARENA_Y + ARENA_H / 2);
    const margin = 40;

    // Player always starts left side going right
    positions.push({ x: ARENA_X + margin, y: cy, dir: 1 });

    if (count >= 2) {
      positions.push({ x: ARENA_R - margin, y: cy, dir: 3 });
    }
    if (count >= 3) {
      positions.push({ x: cx, y: ARENA_Y + margin, dir: 2 });
    }
    if (count >= 4) {
      positions.push({ x: cx, y: ARENA_B - margin, dir: 0 });
    }
    return positions;
  }

  function startRound() {
    resetGrid();
    explosions = [];
    particles = [];
    crashedIds = new Set();

    const totalCycles = 1 + numAI;
    const positions = spawnPositions(totalCycles);
    cycles = [];

    // Player
    const pp = positions[0];
    cycles.push(makeCycle(1, pp.x, pp.y, pp.dir, true, 3));

    // AIs
    for (let i = 1; i < totalCycles; i++) {
      const ap = positions[i];
      cycles.push(makeCycle(i + 1, ap.x, ap.y, ap.dir, false, 2));
    }

    // Place initial positions on grid (stamp rect for each cycle)
    for (const c of cycles) {
      const gv = c.isPlayer ? 1 : c.id;
      gridRectSet(c.x, c.y, CYCLE_HW, CYCLE_HH, gv);
    }

    boostFuel = boostMax;
    boostActive = false;
    boostCooldown = 0;
    roundTimer = 0;
    roundMessage = 90;
  }

  function resetGame() {
    round = 0;
    playerScore = 0;
    aiScore = 0;
    winsNeeded = 3; // best of 5
    baseSpeed = 1.5;
    speedIncrement = 0.2;
    boostMax = 60;
    numAI = 1;
    titlePulse = 0;
    nextRound();
  }

  function nextRound() {
    round++;
    if (round >= 4) numAI = 3;
    else if (round >= 3) numAI = 2;
    else numAI = 1;

    startRound();
  }

  function addExplosion(x, y) {
    explosions.push({ x, y, timer: 18 });
    for (let i = 0; i < 16; i++) {
      particles.push({
        x: x, y: y,
        vx: rnd(6) - 3, vy: rnd(6) - 3,
        life: 8 + flr(rnd(15)),
        color: flr(rnd(3)) + 1
      });
    }
  }

  // --- Sound effects ---
  function turnSound() { note(0, "G5", 0.03); }
  function crashSound() {
    note(0, "C3", 0.15); note(1, "G2", 0.15);
    setTimeout(() => { note(0, "A2", 0.2); }, 100);
  }
  function boostSound() { note(1, "E5", 0.04); }
  function winSound() {
    note(0, "C5", 0.1);
    setTimeout(() => note(0, "E5", 0.1), 100);
    setTimeout(() => note(0, "G5", 0.1), 200);
    setTimeout(() => note(0, "C6", 0.2), 300);
  }
  function loseSound() {
    note(0, "E3", 0.15);
    setTimeout(() => note(0, "C3", 0.2), 150);
  }
  function roundStartSound() {
    note(0, "C4", 0.08);
    setTimeout(() => note(0, "E4", 0.08), 80);
    setTimeout(() => note(0, "G4", 0.1), 160);
  }

  // --- AI Logic ---
  function aiThink(c) {
    const speed = getCurrentSpeed();
    const lookAhead = flr(12 + speed * 5);

    const ahead = c.dir;
    const left = (c.dir + 3) % 4;
    const right = (c.dir + 1) % 4;

    const aheadDist = scanDir(c.x, c.y, ahead, lookAhead);
    const leftDist = scanDir(c.x, c.y, left, lookAhead);
    const rightDist = scanDir(c.x, c.y, right, lookAhead);

    if (aheadDist >= lookAhead && rnd(1) < 0.85) return;

    if (aheadDist < 4) {
      if (leftDist > rightDist) {
        c.dir = left;
      } else if (rightDist > leftDist) {
        c.dir = right;
      } else {
        c.dir = rnd(1) < 0.5 ? left : right;
      }
      return;
    }

    if (aheadDist < lookAhead * 0.6) {
      if (rnd(1) < 0.4) {
        if (leftDist > rightDist + 3) c.dir = left;
        else if (rightDist > leftDist + 3) c.dir = right;
        else if (rnd(1) < 0.5) c.dir = left;
        else c.dir = right;
      }
    }

    // Occasionally make aggressive moves toward player
    if (rnd(1) < 0.08 && aheadDist > 15) {
      const player = cycles[0];
      if (player.alive) {
        const dx = player.x - c.x;
        const dy = player.y - c.y;
        if (_abs(dx) > _abs(dy)) {
          const wantDir = dx > 0 ? 1 : 3;
          if (wantDir !== (c.dir + 2) % 4) {
            const dist = scanDir(c.x, c.y, wantDir, lookAhead);
            if (dist > 10) c.dir = wantDir;
          }
        } else {
          const wantDir = dy > 0 ? 2 : 0;
          if (wantDir !== (c.dir + 2) % 4) {
            const dist = scanDir(c.x, c.y, wantDir, lookAhead);
            if (dist > 10) c.dir = wantDir;
          }
        }
      }
    }
  }

  function scanDir(x, y, dir, maxDist) {
    const dx = DX[dir];
    const dy = DY[dir];
    for (let d = 1; d <= maxDist; d++) {
      const nx = x + dx * d;
      const ny = y + dy * d;
      if (nx <= ARENA_X + CYCLE_HW || nx >= ARENA_R - CYCLE_HW ||
          ny <= ARENA_Y + CYCLE_HH || ny >= ARENA_B - CYCLE_HH) return d - 1;
      if (gridGet(nx, ny) !== 0) return d - 1;
    }
    return maxDist;
  }

  function getCurrentSpeed() {
    return baseSpeed + (round - 1) * speedIncrement;
  }

  // --- Title Scene ---
  Mono.scene(TITLE, {
    init() { resetGame(); },
    update() {
      titlePulse++;
      if (btnp("start") || btnp("a")) { roundStartSound(); Mono.go(PLAY); return; }
    },
    draw() { cls(0); drawTitle(); }
  });

  // --- Game Over Scene ---
  Mono.scene(GAMEOVER, {
    init() { particles = []; },
    update() {
      titlePulse++;
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i]; p.x += p.vx; p.y += p.vy; p.vy += 0.06; p.life--;
        if (p.life <= 0) particles.splice(i, 1);
      }
      if (btnp("start") || btnp("a")) { Mono.go(TITLE); return; }
    },
    draw() { cls(0); drawGameOver(); }
  });

  // --- Round End Scene ---
  Mono.scene(ROUNDEND, {
    init() { roundTimer = 0; },
    update() {
      titlePulse++;
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i]; p.x += p.vx; p.y += p.vy; p.vy += 0.06; p.life--;
        if (p.life <= 0) particles.splice(i, 1);
      }
      for (let i = explosions.length - 1; i >= 0; i--) {
        explosions[i].timer--;
        if (explosions[i].timer <= 0) explosions.splice(i, 1);
      }
      roundTimer++;
      if (roundTimer > 90) {
        if (playerScore >= winsNeeded) { Mono.go(GAMEOVER); return; }
        if (aiScore >= winsNeeded) { Mono.go(GAMEOVER); return; }
        nextRound(); roundStartSound();
        Mono.go(PLAY); return;
      }
    },
    draw() {
      cls(0);
      drawArena(); drawTrails(); drawCycles(); drawExplosions(); drawParticles(); drawHUD();
      drawRoundResult();
    }
  });

  // --- Play Scene ---
  Mono.scene(PLAY, {
    init() { resetGame(); },
    update() {
      titlePulse++;

      if (roundMessage > 0) {
        roundMessage--;
        if (roundMessage === 60) roundStartSound();
        return;
      }

      roundTimer++;

      // Player input
      const player = cycles[0];
      if (player.alive) {
        if (btnp("up") && player.dir !== 2) { player.dir = 0; turnSound(); }
        else if (btnp("down") && player.dir !== 0) { player.dir = 2; turnSound(); }
        else if (btnp("left") && player.dir !== 1) { player.dir = 3; turnSound(); }
        else if (btnp("right") && player.dir !== 3) { player.dir = 1; turnSound(); }

        // Boost
        if (boostCooldown > 0) boostCooldown--;
        if (btn("a") && boostFuel > 0 && boostCooldown <= 0) {
          boostActive = true;
          boostFuel--;
          if (Mono.frame % 6 === 0) boostSound();
        } else {
          boostActive = false;
          if (boostFuel < boostMax && !btn("a")) boostFuel = min(boostMax, boostFuel + 0.2);
        }
      }

      // AI thinking
      for (let i = 1; i < cycles.length; i++) {
        const c = cycles[i];
        if (!c.alive) continue;
        if (Mono.frame % 3 === 0) aiThink(c);
      }

      // Move all cycles
      const speed = getCurrentSpeed();
      const playerSpeed = boostActive ? speed * 1.7 : speed;

      for (const c of cycles) {
        if (!c.alive) continue;

        const s = c.isPlayer ? playerSpeed : speed;
        c.moveAccum += s;

        while (c.moveAccum >= 1 && c.alive) {
          c.moveAccum -= 1;

          const nx = c.x + DX[c.dir];
          const ny = c.y + DY[c.dir];

          // Collision: check if the cycle's hitbox at the new position hits anything
          const ownGv = c.isPlayer ? 1 : c.id;
          const hitWall = nx - CYCLE_HW <= ARENA_X || nx + CYCLE_HW >= ARENA_R ||
                          ny - CYCLE_HH <= ARENA_Y || ny + CYCLE_HH >= ARENA_B;
          const hitTrail = !hitWall && gridRectHit(nx, ny, CYCLE_HW, CYCLE_HH, ownGv);

          if (hitWall || hitTrail) {
            c.alive = false;
            crashedIds.add(c.id);
            addExplosion(c.x, c.y);
            crashSound();
            if (c.isPlayer && boostActive) {
              boostActive = false;
              boostCooldown = 30;
            }
          } else {
            c.x = nx;
            c.y = ny;
            gridRectSet(c.x, c.y, CYCLE_HW, CYCLE_HH, ownGv);
            c.trail.push({ x: c.x, y: c.y });
          }
        }
      }

      // Debug hitboxes for all alive cycles
      for (const c of cycles) {
        if (!c.alive) continue;
        dbg(c.x - CYCLE_HW, c.y - CYCLE_HH, CYCLE_HW * 2 + 1, CYCLE_HH * 2 + 1);
      }

      // Update explosions
      for (let i = explosions.length - 1; i >= 0; i--) {
        explosions[i].timer--;
        if (explosions[i].timer <= 0) explosions.splice(i, 1);
      }
      // Update particles
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx; p.y += p.vy; p.vy += 0.06; p.life--;
        if (p.life <= 0) particles.splice(i, 1);
      }

      // Check round end conditions
      const playerAlive = cycles[0].alive;
      const anyAIAlive = cycles.slice(1).some(c => c.alive);

      if (!playerAlive || !anyAIAlive) {
        if (!playerAlive && !anyAIAlive) {
          // Draw - no points
        } else if (playerAlive) {
          playerScore++;
          winSound();
        } else {
          aiScore++;
          loseSound();
        }
        Mono.go(ROUNDEND); return;
      }
    },
    draw() {
      cls(0);
      drawArena(); drawTrails(); drawCycles(); drawExplosions(); drawParticles(); drawHUD();
      if (roundMessage > 0) drawCountdown();
    }
  });

  function drawTitle() {
    // Background grid effect
    const t = Mono.frame * 0.02;
    for (let x = 0; x < W; x += 16) {
      for (let y = 0; y < H; y++) {
        if ((y + flr(t * 20)) % 16 === 0) pix(x, y, 1);
      }
    }
    for (let y = 0; y < H; y += 16) {
      for (let x = 0; x < W; x++) {
        if ((x + flr(t * 10)) % 16 === 0) pix(x, y, 1);
      }
    }

    // Vanishing point perspective lines
    const cx = W / 2;
    const cy = H / 2 + 30;
    for (let i = 0; i < 12; i++) {
      const angle = (i / 12) * Math.PI * 2 + t;
      const ex = cx + cos(angle) * 200;
      const ey = cy + sin(angle) * 150;
      line(flr(cx), flr(cy), flr(ex), flr(ey), 1);
    }

    // Title background box
    rectf(80, 41, 160, 38, 0);
    rect(80, 41, 160, 38, 2);
    rect(82, 43, 156, 34, 1);

    // Title text
    const bounce = sin(Mono.frame * 0.06) * 3;
    text("TRON", 150, flr(48 + bounce), 3);
    text("LIGHT CYCLES", 130, flr(60 + bounce), 2);

    // Animated light cycles on title (upscaled sprites = 16px tall)
    const bikeY = 90;
    const bikeX1 = flr((Mono.frame * 2) % (W + 100)) - 50;
    const bikeX2 = W - bikeX1 + 50;

    // Trails behind title bikes
    for (let i = 0; i < 40; i++) {
      pix(bikeX1 - i, bikeY + 7, i < 20 ? 3 : 2);
      pix(bikeX1 - i, bikeY + 8, i < 20 ? 3 : 2);
    }
    for (let i = 0; i < 40; i++) {
      pix(bikeX2 + i, bikeY + 23, i < 20 ? 2 : 1);
      pix(bikeX2 + i, bikeY + 24, i < 20 ? 2 : 1);
    }
    sprT(1, bikeX1, bikeY);
    sprT(2, bikeX2, bikeY + 16, true);

    // Instructions
    if (flr(Mono.frame / 20) % 2 === 0) {
      text("PRESS START", 133, 131, 3);
    }

    // Rules
    rectf(87, 146, 147, 64, 0);
    rect(87, 146, 147, 64, 1);
    text("HOW TO PLAY", 133, 151, 2);
    text("ARROWS: TURN YOUR CYCLE", 103, 163, 2);
    text("A: BOOST SPEED", 125, 172, 2);
    text("AVOID WALLS AND TRAILS", 105, 181, 2);
    text("TRAP YOUR OPPONENT!", 113, 190, 2);
    text("BEST OF 5 ROUNDS", 120, 199, 1);

    text("MONO DEMO V0.1", 118, 229, 1);
  }

  function drawGameOver() {
    // Background
    for (let i = 0; i < 30; i++) {
      const x = flr(rnd(W));
      const y = flr(rnd(H));
      pix(x, y, 1);
    }

    drawParticles();

    const won = playerScore >= winsNeeded;

    rectf(80, 60, 160, 105, 0);
    rect(80, 60, 160, 105, won ? 3 : 1);
    rect(82, 62, 156, 101, won ? 2 : 1);

    if (won) {
      sprT(5, 140, 68);
      sprT(5, 164, 68);
      text("YOU WIN!", 140, 88, 3);
    } else {
      text("GAME OVER", 138, 75, 3);
      text("DEREZZING...", 130, 86, 1);
    }

    text("PLAYER: " + playerScore, 125, 105, 3);
    text("CPU:    " + aiScore, 125, 116, 2);
    text("ROUNDS: " + round, 125, 128, 1);

    if (flr(Mono.frame / 20) % 2 === 0) {
      text("PRESS START", 133, 150, 3);
    }
  }

  function drawArena() {
    // Arena border - double line
    rect(ARENA_X, ARENA_Y, ARENA_W, ARENA_H, 2);
    rect(ARENA_X + 1, ARENA_Y + 1, ARENA_W - 2, ARENA_H - 2, 1);

    // Corner accents
    const cLen = 8;
    line(ARENA_X, ARENA_Y, ARENA_X + cLen, ARENA_Y, 3);
    line(ARENA_X, ARENA_Y, ARENA_X, ARENA_Y + cLen, 3);
    line(ARENA_R, ARENA_Y, ARENA_R - cLen, ARENA_Y, 3);
    line(ARENA_R, ARENA_Y, ARENA_R, ARENA_Y + cLen, 3);
    line(ARENA_X, ARENA_B, ARENA_X + cLen, ARENA_B, 3);
    line(ARENA_X, ARENA_B, ARENA_X, ARENA_B - cLen, 3);
    line(ARENA_R, ARENA_B, ARENA_R - cLen, ARENA_B, 3);
    line(ARENA_R, ARENA_B, ARENA_R, ARENA_B - cLen, 3);

    // Subtle grid dots
    for (let gx = ARENA_X + 13; gx < ARENA_R; gx += 13) {
      for (let gy = ARENA_Y + 15; gy < ARENA_B; gy += 15) {
        pix(gx, gy, 1);
      }
    }
  }

  function drawTrails() {
    // Draw trails directly from grid for O(arena) performance
    const buf32 = getBuf32();
    const aw = ARENA_W;
    const ax = ARENA_X;
    const ay = ARENA_Y;
    const c3 = COLOR_U32[3];
    const c2 = COLOR_U32[2];
    for (let gy = 0; gy < ARENA_H; gy++) {
      const rowOff = gy * aw;
      const screenRow = (ay + gy) * W + ax;
      for (let gx = 0; gx < aw; gx++) {
        const v = grid[rowOff + gx];
        if (v === 1) buf32[screenRow + gx] = c3;
        else if (v > 1) buf32[screenRow + gx] = c2;
      }
    }
  }

  function drawCycles() {
    for (const c of cycles) {
      if (!c.alive) continue;

      const hx = c.x;
      const hy = c.y;

      if (c.isPlayer) {
        // Player - 3x3 bright head
        for (let dy = -1; dy <= 1; dy++) {
          for (let dx = -1; dx <= 1; dx++) {
            pix(hx + dx, hy + dy, 3);
          }
        }
        // Direction indicator
        pix(hx + DX[c.dir] * 2, hy + DY[c.dir] * 2, 3);

        // Boost glow
        if (boostActive) {
          pix(hx + DX[c.dir] * 3, hy + DY[c.dir] * 3, flr(Mono.frame / 2) % 2 === 0 ? 3 : 2);
          const perpX = DY[c.dir];
          const perpY = -DX[c.dir];
          pix(hx - DX[c.dir] * 2 + perpX, hy - DY[c.dir] * 2 + perpY, 2);
          pix(hx - DX[c.dir] * 2 - perpX, hy - DY[c.dir] * 2 - perpY, 2);
        }
      } else {
        // AI - 3x3 medium head
        for (let dy = -1; dy <= 1; dy++) {
          for (let dx = -1; dx <= 1; dx++) {
            pix(hx + dx, hy + dy, 2);
          }
        }
        pix(hx + DX[c.dir] * 2, hy + DY[c.dir] * 2, 2);
        pix(hx, hy, 3);
      }
    }
  }

  function drawExplosions() {
    for (const e of explosions) {
      const sprId = e.timer > 9 ? 3 : 4;
      sprT(sprId, flr(e.x) - 8, flr(e.y) - 8);

      // Extra explosion ring
      const r = 18 - e.timer;
      if (r > 0 && r < 15) {
        circ(flr(e.x), flr(e.y), r, e.timer > 6 ? 3 : 2);
      }
    }
  }

  function drawParticles() {
    for (const p of particles) {
      pix(flr(p.x), flr(p.y), p.color);
    }
  }

  function drawHUD() {
    // Top bar background
    rectf(0, 0, W, 15, 0);
    line(0, 15, W, 15, 1);

    // Round info
    text("ROUND " + round, 3, 2, 2);

    // Score
    const scoreStr = "P:" + playerScore + "  CPU:" + aiScore;
    text(scoreStr, 133, 2, 3);

    // Wins needed
    text("FIRST TO " + winsNeeded, 133, 8, 1);

    // Boost meter
    text("BOOST", 247, 2, boostActive ? 3 : 1);
    const meterX = 267;
    const meterW = 40;
    const meterH = 5;
    rect(meterX, 7, meterW, meterH, 1);
    const fillW = flr((boostFuel / boostMax) * (meterW - 2));
    if (fillW > 0) {
      rectf(meterX + 1, 8, fillW, meterH - 2, boostActive ? 3 : 2);
    }

    // Speed indicator
    const spd = getCurrentSpeed();
    text("SPD:" + (flr(spd * 10) / 10), 3, 8, 1);

    // Round score dots
    const dotY = 8;
    const dotStartX = 207;
    for (let i = 0; i < winsNeeded; i++) {
      const filled = i < playerScore;
      if (filled) rectf(dotStartX + i * 8, dotY, 5, 5, 3);
      else rect(dotStartX + i * 8, dotY, 5, 5, 1);
    }
    text("V", dotStartX + winsNeeded * 8 + 2, dotY - 1, 1);
    for (let i = 0; i < winsNeeded; i++) {
      const filled = i < aiScore;
      const dx = dotStartX + (winsNeeded + 1) * 8 + 4 + i * 8;
      if (filled) rectf(dx, dotY, 5, 5, 2);
      else rect(dx, dotY, 5, 5, 1);
    }
  }

  function drawCountdown() {
    const t = roundMessage;
    let msg = "";
    let col = 2;

    if (t > 60) {
      msg = "ROUND " + round;
      col = 3;
      if (numAI > 1) {
        text(numAI + " OPPONENTS", 133, 128, 2);
      }
    } else if (t > 30) {
      msg = "READY";
      col = 2;
    } else if (t > 0) {
      msg = "GO!";
      col = 3;
    }

    if (msg) {
      const tw = msg.length * 5;
      const mx = flr((W - tw) / 2);
      const my = 113;

      rectf(mx - 10, my - 5, tw + 20, 16, 0);
      rect(mx - 10, my - 5, tw + 20, 16, col);

      text(msg, mx, my, col);
    }
  }

  function drawRoundResult() {
    const playerAlive = cycles[0].alive;
    const anyAIAlive = cycles.slice(1).some(c => c.alive);

    let msg, col;
    if (!playerAlive && !anyAIAlive) {
      msg = "DRAW!";
      col = 1;
    } else if (playerAlive) {
      msg = "YOU WIN THE ROUND!";
      col = 3;
    } else {
      msg = "DEREZZZED!";
      col = 2;
    }

    const tw = msg.length * 5;
    const mx = flr((W - tw) / 2);
    const my = 109;

    rectf(mx - 15, my - 8, tw + 30, 24, 0);
    rect(mx - 15, my - 8, tw + 30, 24, col);
    text(msg, mx, my, col);

    text("P:" + playerScore + " - CPU:" + aiScore, mx + 10, my + 10, 2);
  }

  Mono.go(TITLE);
  Mono.boot("screen");
})();
</script>
</body>
</html>

  // --- 8->16 upscale helper ---
  function up(d) {
    let o = "";
    for (let r = 0; r < 8; r++) {
      let row = "";
      for (let c = 0; c < 8; c++) {
        const ch = d[r * 8 + c];
        row += ch + ch;
      }
      o += row + row;
    }
    return o;
  }

  // --- Circle collision helper ---
  function circCollide(x1, y1, r1, x2, y2, r2) {
    const dx = x1 - x2, dy = y1 - y2;
    const dist = dx * dx + dy * dy;
    const rSum = r1 + r2;
    return dist < rSum * rSum;
  }

  // Terrain map - procedurally generated strips
  const TERRAIN_W = 20; // tiles wide (320/16)
  const TERRAIN_H = 2000; // tiles tall (scrolling)
  const terrain = new Uint8Array(TERRAIN_W * TERRAIN_H);

  function genTerrain() {
    for (let y = 0; y < TERRAIN_H; y++) {
      for (let x = 0; x < TERRAIN_W; x++) {
        const n = Math.sin(x * 0.3 + y * 0.1) * 0.5 + Math.sin(x * 0.1 + y * 0.25) * 0.5;
        const n2 = Math.sin(x * 0.05 + y * 0.02) * 0.5 + 0.5;
        if (n2 > 0.7 && _abs(n) < 0.3) {
          terrain[y * TERRAIN_W + x] = 22; // water/river
        } else if (n > 0.4) {
          terrain[y * TERRAIN_W + x] = 21; // forest
        } else if (n > -0.1) {
          terrain[y * TERRAIN_W + x] = 20; // field
        } else {
          if (_abs(Math.sin(y * 0.05) * 5 + 10 - x) < 1) {
            terrain[y * TERRAIN_W + x] = 23;
          } else {
            terrain[y * TERRAIN_W + x] = 20;
          }
        }
      }
    }
  }

  // Air enemy wave patterns
  const PATTERNS = [
    // V-formation sweeping left
    function(wave) {
      const enemies = [];
      for (let i = 0; i < 5; i++) {
        enemies.push({
          type: 5, hp: 1, pts: 100,
          startX: -20 - i * 20, startY: 30 + _abs(i - 2) * 25,
          pattern: "sweep_right", delay: i * 5, speed: 2.5 + wave * 0.1
        });
      }
      return enemies;
    },
    // Column dive from top
    function(wave) {
      const enemies = [];
      const cx = 40 + flr(rnd(W - 80));
      for (let i = 0; i < 4; i++) {
        enemies.push({
          type: 6, hp: 1, pts: 150,
          startX: cx, startY: -20 - i * 30,
          pattern: "dive_zigzag", delay: i * 8, speed: 2 + wave * 0.1
        });
      }
      return enemies;
    },
    // Circle formation
    function(wave) {
      const enemies = [];
      for (let i = 0; i < 6; i++) {
        enemies.push({
          type: 5, hp: 1, pts: 100,
          startX: W + 20, startY: 45 + i * 28,
          pattern: "sweep_left", delay: i * 4, speed: 2.2 + wave * 0.1
        });
      }
      return enemies;
    },
    // Fast arrows
    function(wave) {
      const enemies = [];
      for (let i = 0; i < 3; i++) {
        enemies.push({
          type: 7, hp: 1, pts: 200,
          startX: rnd(W - 32) + 16, startY: -20 - i * 30,
          pattern: "fast_dive", delay: i * 10, speed: 3.5 + wave * 0.15
        });
      }
      return enemies;
    },
    // Bacura wave (indestructible)
    function(wave) {
      const enemies = [];
      for (let i = 0; i < 2; i++) {
        enemies.push({
          type: 19, hp: 999, pts: 0,
          startX: 60 + i * 140, startY: -20,
          pattern: "slow_descent", delay: i * 20, speed: 1.5
        });
      }
      return enemies;
    },
    // Wide V from top
    function(wave) {
      const enemies = [];
      for (let i = 0; i < 7; i++) {
        enemies.push({
          type: 6, hp: 1, pts: 150,
          startX: W / 2 - 72 + i * 24, startY: -20 - _abs(i - 3) * 16,
          pattern: "dive_spread", delay: i * 3, speed: 2 + wave * 0.1
        });
      }
      return enemies;
    }
  ];

  function resetGame() {
    player = { x: W / 2 - 8, y: H - 40, speed: 2.5 };
    zapper = [];
    bombs = [];
    bombReticle = { x: W / 2 - 8, y: H - 80, active: false };
    airEnemies = [];
    groundTargets = [];
    eBullets = [];
    explosions = [];
    particles = [];
    score = 0;
    lives = 3;
    scrollY = 0;
    scrollSpeed = 0.8;
    shootCd = 0;
    bombCd = 0;
    bossActive = false;
    boss = null;
    distanceTraveled = 0;
    nextBossAt = 1500 + flr(rnd(500));
    invincibleTimer = 60;
    genTerrain();
    spawnGroundTargets();
  }

  let waveTimer = 0;
  let waveCount = 0;

  function spawnAirWave() {
    waveCount++;
    const patIdx = flr(rnd(PATTERNS.length));
    const newEnemies = PATTERNS[patIdx](waveCount);
    for (const def of newEnemies) {
      airEnemies.push({
        x: def.startX, y: def.startY,
        type: def.type, hp: def.hp, pts: def.pts,
        pattern: def.pattern, delay: def.delay,
        speed: def.speed, t: 0, alive: true,
        originX: def.startX, originY: def.startY,
        shootTimer: 40 + flr(rnd(60))
      });
    }
  }

  function spawnGroundTargets() {
    for (let i = 0; i < 120; i++) {
      const ty = 50 + i * 15 + flr(rnd(10));
      const tx = 16 + flr(rnd(W - 32));
      const type = flr(rnd(3));
      let sprId, hp, pts;
      if (type === 0) { sprId = 8; hp = 1; pts = 200; }       // tank
      else if (type === 1) { sprId = 9; hp = 2; pts = 300; }   // bunker
      else { sprId = 10; hp = 1; pts = 250; }                  // turret
      groundTargets.push({
        x: tx, mapY: ty * 16,
        sprId: sprId, hp: hp, pts: pts,
        alive: true, type: type,
        angle: rnd(6.28),
        shootTimer: 60 + flr(rnd(120))
      });
    }
  }

  function spawnBoss() {
    bossActive = true;
    boss = {
      x: W / 2 - 40, y: -50,
      hp: 30, maxHp: 30,
      phase: "enter",
      t: 0, pts: 5000,
      shootTimer: 0, moveAngle: 0,
      coreHit: 0
    };
  }

  function addExplosion(x, y, ground) {
    explosions.push({ x: x, y: y, timer: 12, ground: !!ground });
    const count = ground ? 12 : 8;
    for (let i = 0; i < count; i++)
      particles.push({
        x: x + 8, y: y + 8,
        vx: rnd(4) - 2, vy: rnd(4) - 2,
        life: 6 + flr(rnd(10)),
        color: ground ? flr(rnd(2)) + 1 : flr(rnd(3)) + 1
      });
  }

  function shootSound() { note(0, "E6", 0.03); }
  function bombDropSound() { note(1, "C4", 0.08); }
  function bombHitSound() {
    note(0, "C3", 0.1);
    setTimeout(() => note(0, "G2", 0.08), 50);
  }
  function hitSound() { note(1, "C3", 0.05); setTimeout(() => note(1, "E3", 0.04), 30); }
  function deathSound() {
    note(0, "C3", 0.12); note(1, "G2", 0.12);
    setTimeout(() => { note(0, "A2", 0.18); note(1, "E2", 0.18); }, 120);
  }
  function bossDeathSound() {
    note(0, "C4", 0.1);
    setTimeout(() => note(0, "E4", 0.1), 80);
    setTimeout(() => note(0, "G4", 0.1), 160);
    setTimeout(() => { note(0, "C5", 0.2); note(1, "E5", 0.2); }, 240);
  }

  // --- Title Scene ---
  Mono.scene(TITLE, {
    init() { resetGame(); _scene = TITLE; },
    update() {
      scrollY += 0.3;
      if (btnp("start") || btnp("a")) {
        note(0, "C5", 0.08);
        setTimeout(() => note(0, "E5", 0.08), 80);
        setTimeout(() => note(0, "G5", 0.12), 160);
        Mono.go(PLAY); return;
      }
    },
    draw() { drawAll(); }
  });

  // --- Game Over Scene ---
  Mono.scene(GAMEOVER, {
    init() { _scene = GAMEOVER; },
    update() {
      scrollY += 0.2;
      for (let i = particles.length - 1; i >= 0; i--) { const p = particles[i]; p.x += p.vx; p.y += p.vy; p.vy += 0.08; p.life--; if (p.life <= 0) particles.splice(i, 1); }
      if (btnp("start") || btnp("a")) { Mono.go(TITLE); return; }
    },
    draw() { drawAll(); }
  });

  // --- Play Scene ---
  Mono.scene(PLAY, {
    init() { resetGame(); _scene = PLAY; },
    update() {
    // --- Play state ---
    scrollY += scrollSpeed;
    distanceTraveled += scrollSpeed;

    // Invincibility
    if (invincibleTimer > 0) invincibleTimer--;

    // Player movement (all 4 directions)
    if (btn("left")) player.x -= player.speed;
    if (btn("right")) player.x += player.speed;
    if (btn("up")) player.y -= player.speed;
    if (btn("down")) player.y += player.speed;
    player.x = _max(4, min(W - 20, player.x));
    player.y = _max(16, min(H - 20, player.y));

    // Bomb reticle follows player, offset ahead
    bombReticle.x = player.x;
    bombReticle.y = player.y - 56;
    if (bombReticle.y < 16) bombReticle.y = 16;

    // A button: Zapper (air shot)
    if (shootCd > 0) shootCd--;
    if (btn("a") && shootCd <= 0 && zapper.length < 3) {
      zapper.push({ x: player.x + 4, y: player.y - 10 });
      shootCd = 6;
      shootSound();
    }

    // B button: Bomb (ground targeting)
    if (bombCd > 0) bombCd--;
    if (btnp("b") && bombCd <= 0 && bombs.length < 1) {
      bombs.push({
        x: player.x + 4, y: player.y - 8,
        targetX: bombReticle.x + 4, targetY: bombReticle.y + 4,
        progress: 0
      });
      bombCd = 20;
      bombDropSound();
    }

    // Update zapper bullets
    for (let i = zapper.length - 1; i >= 0; i--) {
      zapper[i].y -= 7;
      if (zapper[i].y < -16) zapper.splice(i, 1);
    }

    // Update bombs
    for (let i = bombs.length - 1; i >= 0; i--) {
      const b = bombs[i];
      b.progress += 0.06;
      b.x += (b.targetX - b.x) * 0.08;
      b.y += (b.targetY - b.y) * 0.08;
      if (b.progress >= 1) {
        // Bomb hits ground
        addExplosion(b.targetX - 8, b.targetY - 8, true);
        bombHitSound();
        // Check ground target hits (circle collision: bomb blast r=14 vs target r=8)
        const bombCx = b.targetX, bombCy = b.targetY;
        const bombR = 14;
        for (let j = groundTargets.length - 1; j >= 0; j--) {
          const gt = groundTargets[j];
          if (!gt.alive) continue;
          const screenY = scrollY - gt.mapY;
          const gtCx = gt.x + 8, gtCy = screenY + 8, gtR = 8;
          if (circCollide(bombCx, bombCy, bombR, gtCx, gtCy, gtR)) {
            Mono.dbgC(bombCx, bombCy, bombR);
            Mono.dbgC(gtCx, gtCy, gtR);
            gt.hp--;
            if (gt.hp <= 0) {
              gt.alive = false;
              score += gt.pts;
              addExplosion(gt.x, screenY, true);
            }
          }
        }
        // Check boss hit by bomb (circle collision: bomb blast r=14 vs boss core r=20)
        if (bossActive && boss && boss.phase === "fight") {
          const bossCx = boss.x + 40, bossCy = boss.y + 24, bossR = 20;
          if (circCollide(bombCx, bombCy, bombR, bossCx, bossCy, bossR)) {
            Mono.dbgC(bombCx, bombCy, bombR);
            Mono.dbgC(bossCx, bossCy, bossR);
            boss.hp -= 3;
            boss.coreHit = 6;
            hitSound();
          }
        }
        bombs.splice(i, 1);
      }
    }

    // Spawn air enemy waves
    waveTimer--;
    if (waveTimer <= 0) {
      spawnAirWave();
      waveTimer = 90 + flr(rnd(60)) - min(waveCount * 2, 40);
    }

    // Update air enemies
    for (let i = airEnemies.length - 1; i >= 0; i--) {
      const e = airEnemies[i];
      if (e.delay > 0) { e.delay--; continue; }
      e.t++;

      // Movement patterns
      switch (e.pattern) {
        case "sweep_right":
          e.x = e.originX + e.t * e.speed;
          e.y = e.originY + sin(e.t * 0.08) * 30;
          break;
        case "sweep_left":
          e.x = e.originX - e.t * e.speed;
          e.y = e.originY + sin(e.t * 0.08) * 30;
          break;
        case "dive_zigzag":
          e.x = e.originX + sin(e.t * 0.1) * 40;
          e.y = e.originY + e.t * e.speed;
          break;
        case "fast_dive": {
          const targetX = player.x;
          e.x += (targetX - e.x) * 0.02;
          e.y += e.speed;
          break;
        }
        case "slow_descent":
          e.x = e.originX + sin(e.t * 0.03) * 20;
          e.y = e.originY + e.t * e.speed * 0.5;
          break;
        case "dive_spread":
          e.x = e.originX + sin(e.t * 0.06) * 13;
          e.y = e.originY + e.t * e.speed * 0.8;
          break;
      }

      // Enemy shoots
      e.shootTimer--;
      if (e.shootTimer <= 0 && e.y > 16 && e.y < H - 32 && e.x > 0 && e.x < W) {
        const dx = player.x + 8 - (e.x + 8), dy = player.y + 8 - (e.y + 8);
        const dist = Math.sqrt(dx * dx + dy * dy) || 1;
        eBullets.push({
          x: e.x + 4, y: e.y + 12,
          vx: (dx / dist) * 2.5, vy: (dy / dist) * 2.5
        });
        e.shootTimer = 40 + flr(rnd(50));
      }

      // Off-screen removal
      if (e.y > H + 40 || e.x < -60 || e.x > W + 60) {
        airEnemies.splice(i, 1);
        continue;
      }

      // Zapper vs air enemy collision (circle: bullet r=3 vs enemy r=7)
      for (let j = zapper.length - 1; j >= 0; j--) {
        const b = zapper[j];
        const bCx = b.x + 8, bCy = b.y + 8, bR = 3;
        const eCx = e.x + 8, eCy = e.y + 8, eR = 7;
        if (circCollide(bCx, bCy, bR, eCx, eCy, eR)) {
          Mono.dbgC(bCx, bCy, bR);
          Mono.dbgC(eCx, eCy, eR);
          zapper.splice(j, 1);
          e.hp--;
          if (e.hp <= 0) {
            addExplosion(e.x, e.y, false);
            score += e.pts;
            hitSound();
            airEnemies.splice(i, 1);
          }
          break;
        }
      }
    }

    // Ground turrets shoot at player
    for (const gt of groundTargets) {
      if (!gt.alive || gt.type !== 2) continue;
      const screenY = scrollY - gt.mapY;
      if (screenY < -16 || screenY > H + 16) continue;
      gt.shootTimer--;
      gt.angle = Math.atan2(player.y + 8 - (screenY + 8), player.x + 8 - (gt.x + 8));
      if (gt.shootTimer <= 0) {
        const dx = cos(gt.angle), dy = sin(gt.angle);
        eBullets.push({
          x: gt.x + 8, y: screenY + 8,
          vx: dx * 2, vy: dy * 2
        });
        gt.shootTimer = 80 + flr(rnd(60));
      }
    }

    // Update enemy bullets
    for (let i = eBullets.length - 1; i >= 0; i--) {
      const b = eBullets[i];
      b.x += b.vx; b.y += b.vy;
      if (b.x < -16 || b.x > W + 16 || b.y < -16 || b.y > H + 16) {
        eBullets.splice(i, 1); continue;
      }
      // Hit player (circle: bullet r=3 vs player r=6)
      if (invincibleTimer <= 0) {
        const bCx = b.x + 8, bCy = b.y + 8, bR = 3;
        const pCx = player.x + 8, pCy = player.y + 8, pR = 6;
        if (circCollide(bCx, bCy, bR, pCx, pCy, pR)) {
          Mono.dbgC(bCx, bCy, bR);
          Mono.dbgC(pCx, pCy, pR);
          eBullets.splice(i, 1);
          playerDie();
        }
      }
    }

    // Air enemy vs player collision (circle: enemy r=7 vs player r=6)
    if (invincibleTimer <= 0) {
      for (let i = airEnemies.length - 1; i >= 0; i--) {
        const e = airEnemies[i];
        if (e.delay > 0) continue;
        const eCx = e.x + 8, eCy = e.y + 8, eR = 7;
        const pCx = player.x + 8, pCy = player.y + 8, pR = 6;
        if (circCollide(eCx, eCy, eR, pCx, pCy, pR)) {
          Mono.dbgC(eCx, eCy, eR);
          Mono.dbgC(pCx, pCy, pR);
          if (e.hp < 999) {
            addExplosion(e.x, e.y, false);
            airEnemies.splice(i, 1);
          }
          playerDie();
          break;
        }
      }
    }

    // Boss logic
    if (!bossActive && distanceTraveled > nextBossAt) {
      spawnBoss();
      nextBossAt = distanceTraveled + 2000 + flr(rnd(500));
    }

    if (bossActive && boss) {
      boss.t++;
      if (boss.coreHit > 0) boss.coreHit--;

      if (boss.phase === "enter") {
        boss.y += 0.8;
        if (boss.y >= 30) { boss.phase = "fight"; boss.t = 0; }
      } else if (boss.phase === "fight") {
        boss.moveAngle += 0.02;
        boss.x = W / 2 - 40 + sin(boss.moveAngle) * 60;
        boss.y = 30 + sin(boss.moveAngle * 0.7) * 15;

        // Boss shoots
        boss.shootTimer--;
        if (boss.shootTimer <= 0) {
          for (let a = 0; a < 5; a++) {
            const angle = -Math.PI / 2 + (a - 2) * 0.3;
            eBullets.push({
              x: boss.x + 36, y: boss.y + 40,
              vx: cos(angle) * 2.5, vy: sin(angle) * 2.5
            });
          }
          boss.shootTimer = 25 + flr(rnd(15));
        }

        // Zapper vs boss (circle: bullet r=3 vs boss core r=20)
        for (let j = zapper.length - 1; j >= 0; j--) {
          const b = zapper[j];
          const bCx = b.x + 8, bCy = b.y + 8, bR = 3;
          const bossCx = boss.x + 40, bossCy = boss.y + 24, bossR = 20;
          if (circCollide(bCx, bCy, bR, bossCx, bossCy, bossR)) {
            Mono.dbgC(bCx, bCy, bR);
            Mono.dbgC(bossCx, bossCy, bossR);
            zapper.splice(j, 1);
            boss.hp--;
            boss.coreHit = 4;
            if (boss.hp <= 0) {
              for (let ex = 0; ex < 6; ex++)
                addExplosion(boss.x + rnd(64) - 8, boss.y + rnd(40) - 8, false);
              score += boss.pts;
              bossDeathSound();
              bossActive = false;
              boss = null;
            } else {
              note(1, "A4", 0.02);
            }
            break;
          }
        }
      }
    }

    // Explosions
    for (let i = explosions.length - 1; i >= 0; i--) {
      explosions[i].timer--;
      if (explosions[i].timer <= 0) explosions.splice(i, 1);
    }

    // Particles
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx; p.y += p.vy; p.vy += 0.06; p.life--;
      if (p.life <= 0) particles.splice(i, 1);
    }
    },
    draw() { drawAll(); }
  });

  function playerDie() {
    lives--;
    addExplosion(player.x, player.y, false);
    deathSound();
    player.x = W / 2 - 8;
    player.y = H - 40;
    invincibleTimer = 90;
    if (lives <= 0) {
      addExplosion(player.x - 8, player.y + 4, false);
      Mono.go(GAMEOVER);
    }
  }

  function drawAll() {
    cls(0);

    // --- Draw terrain (parallax scrolling ground) ---
    const tileSize = 16;
    const tileOffY = -(scrollY % tileSize);
    const mapRow = -flr(scrollY / tileSize);

    // Far layer (slower parallax - subtle dots)
    const farOff = -flr(scrollY * 0.3);
    for (let py = -1; py < H / tileSize + 1; py++) {
      for (let px = 0; px < W / tileSize; px++) {
        const my = (flr(farOff / tileSize) + py) % TERRAIN_H;
        if (my < 0) continue;
        const tile = terrain[(my % TERRAIN_H) * TERRAIN_W + (px % TERRAIN_W)];
        if (tile === 22) {
          const sx = px * tileSize, sy = py * tileSize - (farOff % tileSize);
          if (sy > tileSize && sy < H) {
            pix(sx + 5, sy + 4, 1);
            pix(sx + 11, sy + 9, 1);
          }
        } else if (tile === 21) {
          const sx = px * tileSize, sy = py * tileSize - (farOff % tileSize);
          if (sy > tileSize && sy < H) {
            pix(sx + 4, sy + 5, 1);
            pix(sx + 10, sy + 3, 1);
          }
        }
      }
    }

    // Near layer (main terrain)
    for (let py = -1; py < H / tileSize + 2; py++) {
      for (let px = 0; px < W / tileSize; px++) {
        const my = (mapRow + py) % TERRAIN_H;
        if (my < 0) continue;
        const tile = terrain[(my % TERRAIN_H) * TERRAIN_W + (px % TERRAIN_W)];
        const sx = px * tileSize, sy = py * tileSize - tileOffY;
        if (sy < tileSize || sy > H) continue;

        if (tile === 21) {
          // Forest - scattered dots
          pix(sx + 2, sy + 0, 1);
          pix(sx + 8, sy + 4, 1);
          pix(sx + 0, sy + 8, 1);
          pix(sx + 12, sy + 6, 1);
          pix(sx + 6, sy + 12, 1);
          pix(sx + 4, sy + 2, 1);
        } else if (tile === 22) {
          // Water - horizontal lines
          const waveOff = flr(sin((sy + Mono.frame * 2) * 0.1) * 3);
          for (let wx = 0; wx < 16; wx += 3) {
            pix(sx + wx + waveOff, sy + 4, 1);
            pix(sx + wx + 1 - waveOff, sy + 10, 1);
          }
        } else if (tile === 23) {
          // Road
          pix(sx + 6, sy, 1); pix(sx + 7, sy, 1);
          pix(sx + 6, sy + 4, 1); pix(sx + 7, sy + 4, 1);
          pix(sx + 6, sy + 8, 1); pix(sx + 7, sy + 8, 1);
          pix(sx + 6, sy + 12, 1); pix(sx + 7, sy + 12, 1);
        } else if (tile === 20) {
          // Field - very sparse dots
          if ((px + my) % 5 === 0) pix(sx + 6, sy + 8, 1);
        }
      }
    }

    // --- Draw ground targets ---
    for (const gt of groundTargets) {
      if (!gt.alive) continue;
      const screenY = scrollY - gt.mapY;
      if (screenY < tileSize || screenY > H + tileSize) continue;

      if (gt.type === 2) {
        // Turret with rotation indicator
        sprT(gt.sprId, flr(gt.x), flr(screenY));
        Mono.dbg(gt.x, screenY, 16, 16);
        // Draw gun barrel direction
        const bx = gt.x + 8 + cos(gt.angle) * 9;
        const by = screenY + 8 + sin(gt.angle) * 9;
        pix(flr(bx), flr(by), 3);
      } else {
        sprT(gt.sprId, flr(gt.x), flr(screenY));
        Mono.dbg(gt.x, screenY, 16, 16);
      }
    }

    // --- Draw bomb reticle ---
    if (_scene === PLAY) {
      const rx = flr(bombReticle.x), ry = flr(bombReticle.y);
      const blink = flr(Mono.frame / 4) % 2;
      if (blink) {
        // Crosshair
        line(rx + 8, ry - 4, rx + 8, ry + 20, 2);
        line(rx - 4, ry + 8, rx + 20, ry + 8, 2);
        rect(rx, ry, 16, 16, 2);
      }
    }

    // --- Draw bombs in flight ---
    for (const b of bombs) {
      const bx = flr(b.x), by = flr(b.y);
      sprT(3, bx, by);
      Mono.dbgC(b.targetX, b.targetY, flr(b.progress * 6) + 2);
      // Shadow growing as bomb descends
      const shadowSize = flr(b.progress * 6) + 2;
      circ(flr(b.targetX + 4), flr(b.targetY + 4), shadowSize, 1);
    }

    // --- Draw enemy bullets ---
    for (const b of eBullets) {
      pix(flr(b.x), flr(b.y), 3);
      pix(flr(b.x), flr(b.y) + 1, 2);
      pix(flr(b.x) + 1, flr(b.y), 2);
      Mono.dbgC(flr(b.x) + 8, flr(b.y) + 8, 3);
    }

    // --- Draw air enemies ---
    for (const e of airEnemies) {
      if (e.delay > 0) continue;
      if (e.x < -16 || e.x > W + 16 || e.y < -16 || e.y > H + 16) continue;
      sprT(e.type, flr(e.x), flr(e.y));
      Mono.dbgC(e.x + 8, e.y + 8, 7);
    }

    // --- Draw zapper bullets ---
    for (const b of zapper) {
      sprT(2, flr(b.x), flr(b.y));
      Mono.dbgC(b.x + 8, b.y + 8, 3);
    }

    // --- Draw boss ---
    if (bossActive && boss) {
      const bx = flr(boss.x), by = flr(boss.y);
      // Left wing
      sprT(12, bx, by);
      sprT(12, bx, by + 16);
      // Core
      if (boss.coreHit > 0 && flr(Mono.frame / 2) % 2) {
        rectf(bx + 16, by, 48, 48, 3);
      } else {
        sprT(11, bx + 16, by);
        sprT(11, bx + 32, by);
        sprT(11, bx + 48, by);
        sprT(11, bx + 16, by + 16);
        sprT(11, bx + 32, by + 16);
        sprT(11, bx + 48, by + 16);
      }
      // Right wing
      sprT(12, bx + 64, by, true);
      sprT(12, bx + 64, by + 16, true);
      // Bottom
      sprT(11, bx + 16, by + 32);
      sprT(11, bx + 32, by + 32);
      sprT(11, bx + 48, by + 32);

      Mono.dbgC(bx + 40, by + 24, 20);

      // HP bar
      const hpW = flr((boss.hp / boss.maxHp) * 64);
      rectf(bx + 8, by - 6, 64, 3, 1);
      rectf(bx + 8, by - 6, hpW, 3, 3);
    }

    // --- Draw player ---
    if (_scene === PLAY) {
      if (invincibleTimer > 0 && flr(Mono.frame / 3) % 2) {
        // Blink during invincibility
      } else {
        sprT(1, flr(player.x), flr(player.y));
        Mono.dbgC(player.x + 8, player.y + 8, 6);
        // Engine glow
        if (Mono.frame % 4 < 2) {
          pix(flr(player.x) + 7, flr(player.y) + 14, 2);
          pix(flr(player.x) + 7, flr(player.y) + 15, 3);
          pix(flr(player.x) + 8, flr(player.y) + 14, 2);
          pix(flr(player.x) + 8, flr(player.y) + 15, 3);
        } else {
          pix(flr(player.x) + 7, flr(player.y) + 14, 3);
          pix(flr(player.x) + 8, flr(player.y) + 14, 3);
        }
      }
    }

    // --- Explosions ---
    for (const e of explosions) {
      const sprId = e.ground ? (e.timer > 6 ? 16 : 17) : (e.timer > 6 ? 14 : 15);
      sprT(sprId, flr(e.x), flr(e.y));
    }

    // --- Particles ---
    for (const p of particles) pix(flr(p.x), flr(p.y), p.color);

    // --- HUD ---
    rectf(0, 0, W, 14, 0);
    text("SCORE:" + score, 4, 4, 3);
    // Cap lives icons to MAX_LIVES_DISPLAY to prevent overflow
    const livesToShow = min(lives, MAX_LIVES_DISPLAY);
    const livesStartX = W - 4 - livesToShow * 18;
    for (let i = 0; i < livesToShow; i++) sprT(18, livesStartX + i * 18, 1);

    // --- Title screen ---
    if (_scene === TITLE) {
      rectf(60, 36, 200, 170, 0);

      const ty = 50 + sin(Mono.frame * 0.05) * 3;
      text("XEVIOUS", W / 2 - 20, flr(ty), 3);
      rectf(W / 2 - 27, flr(ty) + 10, 53, 1, 2);

      // Show sample enemies
      const sx = W / 2 - 48;
      sprT(5, sx, flr(ty) + 18 + sin(Mono.frame * 0.08) * 2);
      sprT(6, sx + 20, flr(ty) + 18 + sin(Mono.frame * 0.08 + 1) * 2);
      sprT(7, sx + 40, flr(ty) + 18 + sin(Mono.frame * 0.08 + 2) * 2);
      sprT(19, sx + 60, flr(ty) + 18 + sin(Mono.frame * 0.08 + 3) * 2);
      sprT(5, sx + 80, flr(ty) + 18 + sin(Mono.frame * 0.08 + 4) * 2);

      if (flr(Mono.frame / 20) % 2 === 0) text("PRESS START", W / 2 - 28, 128, 3);

      text("- AIR TARGETS -", W / 2 - 38, 143, 2);
      sprT(5, W / 2 - 32, 152); text("TORKAN  100", W / 2 - 14, 155, 2);
      sprT(6, W / 2 - 32, 168); text("TOROID  150", W / 2 - 14, 171, 2);
      sprT(7, W / 2 - 32, 184); text("ZOSHI   200", W / 2 - 14, 187, 2);

      text("- GROUND TARGETS -", W / 2 - 48, 204, 2);
      sprT(8, W / 2 - 32, 213); text("TANK    200", W / 2 - 14, 216, 2);
      sprT(9, W / 2 - 32, 229); text("BUNKER  300", W / 2 - 14, 232, 2);

      text("Z=ZAPPER  X=BOMB", W / 2 - 42, 248, 1);
      text("MONO DEMO V0.1", W / 2 - 43, 260, 1);
      return;
    }

    // --- Game over ---
    if (_scene === GAMEOVER) {
      rectf(W / 2 - 50, 75, 100, 65, 0);
      text("GAME OVER", W / 2 - 24, 86, 3);
      text("SCORE: " + score, W / 2 - 24, 101, 2);
      if (flr(Mono.frame / 20) % 2 === 0) text("PRESS START", W / 2 - 28, 120, 3);
    }
  }

  Mono.go(TITLE);
  Mono.boot("screen");
})();
</script>
</body>

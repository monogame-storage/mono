; CYD Mono audio test program
; Standalone PlatformIO project — builds independently of experiments/cyd/.
; Implements the reverse-spec audio stack (I2S + internal DAC + 4-voice
; software mixer) and a touch UI that exercises every feature.

[env:cyd-audio]
platform        = espressif32
board           = esp32dev
framework       = arduino
monitor_speed   = 115200
upload_speed    = 460800

board_build.f_cpu = 240000000L

build_flags =
    -O2
    -DCORE_DEBUG_LEVEL=0
    -DCYD_SPI_FREQ=80000000

lib_deps =
    lovyan03/LovyanGFX@^1.1.16

; ESP32-2432S028R (CYD, dual-USB variant) — Mono blit probe
; Goal: measure the headroom for a 160x120 framebuffer pushed at 2x to 320x240.

[env:cyd]
platform        = espressif32
board           = esp32dev
framework       = arduino
monitor_speed   = 115200
upload_speed    = 460800

board_build.f_cpu = 240000000L

; Try flipping SPI_FREQ to 55 or 80 MHz to probe the ceiling.
build_flags =
    -O2
    -DCORE_DEBUG_LEVEL=0
    -DCYD_SPI_FREQ=80000000
    -DMONO_W=160
    -DMONO_H=120
    -DBENCH_SECONDS=3
    -DLUA_USE_C89
    -DLUA_32BITS
    -Ilib/lua/src

lib_deps =
    lovyan03/LovyanGFX@^1.1.16

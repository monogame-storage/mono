<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Mono — Playground</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;800&family=Oswald:wght@600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a1a;
    color: #e8e8e8;
    font-family: 'JetBrains Mono', monospace;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
  }

  /* Toolbar */
  #toolbar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0 12px;
    background: #111;
    height: 44px;
    flex-shrink: 0;
  }
  #back-btn {
    display: flex;
    align-items: center;
    gap: 5px;
    background: #2d2d2d;
    border: none;
    border-radius: 5px;
    color: #777;
    padding: 0 10px;
    height: 28px;
    font-family: inherit;
    font-size: 10px;
    cursor: pointer;
    text-decoration: none;
  }
  #back-btn:hover { background: #3d3d3d; color: #e8e8e8; }
  .toolbar-sep {
    width: 1px;
    height: 20px;
    background: #3d3d3d;
  }
  .toolbar-title {
    font-family: 'Oswald', sans-serif;
    font-size: 15px;
    font-weight: 600;
    color: #777;
    letter-spacing: 1px;
  }

  /* Workspace */
  #workspace {
    display: flex;
    flex: 1;
    min-height: 0;
    gap: 1px;
    background: #1a1a1a;
  }

  /* Left Column */
  #left-col {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 1px;
    min-width: 0;
  }

  /* Code Editor */
  #code-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    background: #212121;
    min-height: 0;
  }
  #editor-wrap {
    flex: 1;
    min-height: 0;
    overflow: hidden;
    background: #1e1e1e;
  }
  .cm-editor { height: 100%; font-size: 13px; }
  .cm-editor .cm-scroller {
    overflow: auto;
    font-family: 'JetBrains Mono', monospace;
  }

  /* AI Prompt */
  #ai-panel {
    height: 200px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    background: #212121;
  }
  #ai-tabs {
    display: flex;
    align-items: flex-end;
    background: #2d2d2d;
    height: 32px;
    flex-shrink: 0;
  }
  .ai-tab {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 0 12px;
    height: 30px;
    font-size: 10px;
    font-weight: 600;
    color: #ff6b35;
    background: #212121;
    border-radius: 4px 4px 0 0;
  }
  .ai-model-tag {
    margin-left: auto;
    background: #1a1a1a;
    color: #777;
    font-size: 8px;
    font-weight: 600;
    padding: 0 6px;
    height: 22px;
    line-height: 22px;
    border-radius: 3px;
    margin-right: 8px;
  }
  #ai-body {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding: 10px;
    min-height: 0;
  }
  #prompt-box {
    flex: 1;
    background: #1e1e1e;
    border: none;
    border-radius: 6px;
    color: #e8e8e8;
    font-family: inherit;
    font-size: 11px;
    line-height: 1.5;
    padding: 10px 12px;
    resize: none;
    outline: none;
  }
  #prompt-box::placeholder { color: #3d3d3d; font-size: 9px; }
  #ai-actions {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .context-chip {
    display: flex;
    align-items: center;
    gap: 4px;
    background: #2d2d2d;
    padding: 0 7px;
    height: 22px;
    border-radius: 4px;
    font-size: 9px;
    color: #e8e8e8;
  }
  .context-chip .dot { width: 6px; height: 6px; border-radius: 50%; }
  .dot-teal { background: #00d4aa; }
  .dot-orange { background: #ff6b35; }
  #ai-actions .spacer { flex: 1; }
  #btn-generate {
    display: flex;
    align-items: center;
    gap: 5px;
    background: #ff6b35;
    border: none;
    border-radius: 6px;
    color: #0d0d0d;
    font-family: inherit;
    font-size: 10px;
    font-weight: 600;
    padding: 0 14px;
    height: 28px;
    cursor: pointer;
  }
  #btn-generate:hover { background: #ff8555; }

  /* Right Column */
  #right-col {
    width: 360px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: 1px;
    background: #1a1a1a;
    min-height: 0;
    overflow: hidden;
  }

  /* Panel tabs common */
  .panel-tabs {
    display: flex;
    align-items: flex-end;
    background: #2d2d2d;
    height: 32px;
    flex-shrink: 0;
  }
  .panel-tab {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 0 12px;
    height: 30px;
    font-size: 10px;
    font-weight: 600;
    color: #fff;
    background: #212121;
    border-radius: 4px 4px 0 0;
  }
  .panel-tab-inactive {
    height: 28px;
    color: #777;
    font-weight: 400;
    background: #2d2d2d;
  }

  /* Engine */
  #engine-panel {
    height: 96px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    background: #212121;
  }
  #engine-body {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 6px;
    padding: 6px 14px;
  }
  #engine-btns {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .en-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
    border: none;
    border-radius: 6px;
    font-family: inherit;
    font-size: 10px;
    font-weight: 600;
    color: #fff;
    padding: 0 14px;
    height: 30px;
    cursor: pointer;
  }
  .en-btn:hover { filter: brightness(1.2); }
  #btn-start { background: #4a8a4a; }
  #btn-stop { background: #8a4a4a; }
  #btn-pause, #btn-step { background: #2d2d2d; }
  .en-sep { width: 1px; height: 20px; background: #3d3d3d; }
  #engine-status {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 10px;
  }
  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 4px;
    background: #777;
  }
  .status-dot.running { background: #00d4aa; }
  #status-text { color: #777; }
  #status-text.running { color: #00d4aa; }
  .status-sep { width: 1px; height: 12px; background: #3d3d3d; }
  #status-fps, #status-frame { color: #777; }

  /* Console Screen */
  #screen-panel {
    flex: 1;
    min-height: 120px;
    display: flex;
    flex-direction: column;
    background: #212121;
  }
  #screen-body {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #0a0a0a;
    gap: 4px;
    padding: 8px;
    outline: none;
    min-height: 0;
    overflow: hidden;
  }
  #screen-body:focus {
    box-shadow: inset 0 0 0 1px #00d4aa44;
  }
  canvas {
    display: block;
    max-width: 100%;
    max-height: 100%;
    width: auto;
    height: auto;
    aspect-ratio: 320 / 288;
    object-fit: contain;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    border: 1px solid #3d3d3d;
    background: #000;
  }
  #screen-footer {
    display: flex;
    align-items: center;
    width: 100%;
    padding: 0 4px;
    flex-shrink: 0;
  }
  #screen-label {
    font-size: 8px;
    color: #3d3d3d;
  }
  #shader-toggle {
    margin-left: auto;
    background: none;
    border: 1px solid #3d3d3d;
    border-radius: 3px;
    color: #3d3d3d;
    font-family: inherit;
    font-size: 7px;
    padding: 1px 5px;
    cursor: pointer;
  }
  #shader-toggle:hover { color: #aaa; border-color: #aaa; }
  #shader-toggle.active { color: #00d4aa; border-color: #00d4aa; }

  /* Console Gamepad */
  #gamepad-panel {
    height: 150px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    background: #212121;
  }
  #gamepad-body {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 24px;
  }

  /* D-pad */
  .dpad {
    width: 110px;
    height: 110px;
    position: relative;
    flex-shrink: 0;
  }
  .dpad-btn {
    position: absolute;
    width: 36px;
    height: 36px;
    background: #2d2d2d;
    border: none;
    border-radius: 4px;
    color: #999;
    font-size: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-tap-highlight-color: transparent;
  }
  .dpad-btn.pressed { background: #555; color: #fff; }
  .dpad-up    { left: 37px; top: 0; }
  .dpad-down  { left: 37px; top: 74px; }
  .dpad-left  { left: 0; top: 37px; }
  .dpad-right { left: 74px; top: 37px; }
  .dpad-center {
    position: absolute;
    left: 37px; top: 37px;
    width: 36px; height: 36px;
    background: #2d2d2d;
  }

  /* Meta buttons */
  .meta-btns {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .meta-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    background: #2d2d2d;
    border: none;
    border-radius: 8px;
    color: #777;
    font-family: inherit;
    font-size: 7px;
    font-weight: 600;
    width: 50px;
    height: 16px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .meta-btn:active, .meta-btn.pressed { background: #555; color: #fff; }

  /* AB buttons */
  .ab-area {
    width: 110px;
    height: 90px;
    position: relative;
    flex-shrink: 0;
  }
  .ab-btn {
    position: absolute;
    width: 50px;
    height: 50px;
    border-radius: 50%;
    background: #e05555;
    border: none;
    color: #fff;
    font-family: inherit;
    font-size: 16px;
    font-weight: 800;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-tap-highlight-color: transparent;
  }
  .ab-btn:active, .ab-btn.pressed { background: #ff7070; }
  .btn-b { left: 0; top: 40px; }
  .btn-a { left: 60px; top: 10px; }

  /* Console Accel */
  #accel-panel {
    height: 120px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    background: #212121;
  }
  #accel-body {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    padding: 8px 16px;
  }
  .tilt-viz {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: #2d2d2d;
    border: 1px solid #3d3d3d;
    position: relative;
    flex-shrink: 0;
  }
  .tilt-cross-h, .tilt-cross-v {
    position: absolute;
    background: #3d3d3d;
  }
  .tilt-cross-h { width: 100%; height: 1px; top: 50%; }
  .tilt-cross-v { height: 100%; width: 1px; left: 50%; }
  .tilt-dot {
    position: absolute;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: #ff6b35;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
  }
  .accel-data {
    display: flex;
    flex-direction: column;
    gap: 4px;
    font-size: 12px;
  }
  .accel-data .label { font-size: 9px; color: #00d4aa; margin-top: 4px; }

  /* Console Log */
  #log-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    background: #212121;
    min-height: 60px;
    overflow: hidden;
    resize: both;
  }
  #log-body {
    flex: 1;
    overflow: auto;
    padding: 8px 12px;
    font-size: 11px;
    line-height: 1.6;
    color: #aaa;
  }
  #log-body .log-line { white-space: pre-wrap; word-break: break-all; }
  #log-body .log-error { color: #e66; }
  #log-body .log-info { color: #777; }
  .log-tabs-extra {
    margin-left: auto;
    display: flex;
    align-items: center;
    margin-right: 8px;
  }
  .log-clear {
    background: none;
    border: none;
    color: #777;
    font-family: inherit;
    font-size: 9px;
    cursor: pointer;
  }
  .log-clear:hover { color: #e8e8e8; }
</style>
</head>
<body>

<!-- Toolbar -->
<div id="toolbar">
  <a id="back-btn" href="/">&#8592;</a>
  <div class="toolbar-sep"></div>
  <span class="toolbar-title">PLAYGROUND</span>
</div>

<!-- Workspace -->
<div id="workspace">
  <!-- Left Column -->
  <div id="left-col">
    <!-- Code Editor (no tabs) -->
    <div id="code-panel">
      <div id="editor-wrap"></div>
    </div>

    <!-- AI Prompt -->
    <div id="ai-panel">
      <div id="ai-tabs">
        <div class="ai-tab">&#10024; ai_prompt</div>
        <div style="flex:1"></div>
        <div class="ai-model-tag">claude-sonnet-4-6</div>
      </div>
      <div id="ai-body">
        <textarea id="prompt-box" placeholder="// describe your game in natural language"></textarea>
        <div id="ai-actions">
          <div class="context-chip"><span class="dot dot-teal"></span> API.md</div>
          <div class="context-chip"><span class="dot dot-orange"></span> AI-PITFALLS.md</div>
          <div class="spacer"></div>
          <button id="btn-generate">&#10024; Generate</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Right Column -->
  <div id="right-col">
    <!-- Engine -->
    <div id="engine-panel">
      <div class="panel-tabs">
        <div class="panel-tab">&#9881; engine</div>
      </div>
      <div id="engine-body">
        <div id="engine-btns">
          <button class="en-btn" id="btn-start">&#9654; Start</button>
          <button class="en-btn" id="btn-stop">&#9632; Stop</button>
          <div class="en-sep"></div>
          <button class="en-btn" id="btn-pause">&#10074;&#10074; Pause</button>
          <button class="en-btn" id="btn-step">&#9654;&#10074; Step</button>
        </div>
        <div id="engine-status">
          <div class="status-dot" id="status-dot"></div>
          <span id="status-text">stopped</span>
          <div class="status-sep"></div>
          <span id="status-fps">-- fps</span>
          <div class="status-sep"></div>
          <span id="status-frame">frame: 0</span>
        </div>
      </div>
    </div>

    <!-- Console Screen -->
    <div id="screen-panel">
      <div class="panel-tabs">
        <div class="panel-tab">&#9635; console.screen</div>
      </div>
      <div id="screen-body" tabindex="0">
        <canvas id="screen"></canvas>
        <div id="screen-footer">
          <span id="screen-label">160x144 // 2x</span>
          <button id="shader-toggle" class="active">SHADER</button>
        </div>
      </div>
    </div>

    <!-- Console Gamepad -->
    <div id="gamepad-panel">
      <div class="panel-tabs">
        <div class="panel-tab">&#127918; console.gamepad</div>
      </div>
      <div id="gamepad-body">
        <div class="dpad">
          <button class="dpad-btn dpad-up" data-key="ArrowUp">&#8743;</button>
          <button class="dpad-btn dpad-down" data-key="ArrowDown">&#8744;</button>
          <button class="dpad-btn dpad-left" data-key="ArrowLeft">&#60;</button>
          <button class="dpad-btn dpad-right" data-key="ArrowRight">&#62;</button>
          <div class="dpad-center"></div>
        </div>
        <div class="meta-btns">
          <button class="meta-btn" data-key=" ">SEL</button>
          <button class="meta-btn" data-key="Enter">START</button>
        </div>
        <div class="ab-area">
          <button class="ab-btn btn-b" data-key="x">B</button>
          <button class="ab-btn btn-a" data-key="z">A</button>
        </div>
      </div>
    </div>

    <!-- Console Accel -->
    <div id="accel-panel">
      <div class="panel-tabs">
        <div class="panel-tab">&#128241; console.accel</div>
      </div>
      <div id="accel-body">
        <div class="tilt-viz">
          <div class="tilt-cross-h"></div>
          <div class="tilt-cross-v"></div>
          <div class="tilt-dot" id="tilt-dot"></div>
        </div>
        <div class="accel-data">
          <span id="accel-x">x:  0.00</span>
          <span id="accel-y">y:  0.00</span>
          <span id="accel-z">z:  0.00</span>
          <span class="label" id="accel-status">tilt: disabled</span>
        </div>
      </div>
    </div>

    <!-- Console Log -->
    <div id="log-panel">
      <div class="panel-tabs">
        <div class="panel-tab">&#10095;_ console.log</div>
        <div class="log-tabs-extra">
          <button class="log-clear" id="btn-clear">clear</button>
        </div>
      </div>
      <div id="log-body"></div>
    </div>
  </div>
</div>

<script src="../runtime/engine.js?v=15"></script>
<script src="../runtime/shader.js?v=15"></script>
<script src="../runtime/shaders/tint.js?v=15"></script>
<script src="../runtime/shaders/scanlines.js?v=15"></script>
<script src="../runtime/shaders/lcd.js?v=15"></script>
<script src="../runtime/shaders/lcd3d.js?v=15"></script>
<script src="../runtime/shaders/crt.js?v=15"></script>
<script src="../runtime/console-log.js"></script>
<script src="../runtime/console-screen.js"></script>
<script src="../runtime/console-accel.js"></script>
<script src="../runtime/console-gamepad.js"></script>

<script type="module">

const DEFAULT_CODE = `-- Space Invaders (1-bit, 160x144)

local player_spr = {

}

-- UFO - 16x7
local ufo_spr = {

-- Shield - 22x16
local shield_spr = {

  ".111111111111111111111",

-- Draw sprite helper
local function draw_spr(spr, sx, sy, c)
  for row = 1, #spr do

    for col = 1, #line_str do
      if line_str:sub(col, col) == "1" then
        pix(sx + col - 1, sy + row - 1, c)
      end
    end
  end
end

-- ===== GAME STATE =====

local STATE_PLAY = 0
local STATE_DEAD = 1
local STATE_WIN  = 2
local STATE_TITLE = 3
local state = STATE_TITLE

-- Player
local px, py
local plives
local pbullet
local pscore
local phiscore = 0

-- Aliens
local aliens = {}
local alien_dir
local alien_speed
local alien_move_timer
local alien_move_interval
local alien_frame
local alien_bullets = {}
local alien_shoot_timer

-- UFO
local ufo = nil
local ufo_timer

-- Shields
local shield_hp = {}

-- Explosion
local explosions = {}

local function init_shields()
  shield_hp = {}
  for i = 1, 4 do
    shield_hp[i] = {}
    for row = 1, #shield_spr do
      shield_hp[i][row] = {}
      for col = 1, #shield_spr[1] do
        shield_hp[i][row][col] = (shield_spr[row]:sub(col, col) == "1")
      end
    end
  end
end

local function init_aliens()
  aliens = {}
  for row = 0, 4 do
    for col = 0, 10 do
      local atype
      if row == 0 then atype = 1
      elseif row <= 2 then atype = 2
      else atype = 3 end
      aliens[#aliens + 1] = {
        x = 10 + col * 13,
        y = 20 + row * 12,
        type = atype,
        alive = true
      }
    end
  end
  alien_dir = 1
  alien_speed = 1
  alien_move_timer = 0
  alien_move_interval = 20
  alien_frame = 0
  alien_bullets = {}
  alien_shoot_timer = 0
end

local function reset_game()
  px = (W - 13) / 2
  py = H - 16
  plives = 3
  pbullet = nil
  pscore = 0
  ufo = nil
  ufo_timer = 0
  explosions = {}
  init_aliens()
  init_shields()
  state = STATE_PLAY
end

local function count_alive()
  local n = 0
  for i = 1, #aliens do
    if aliens[i].alive then n = n + 1 end
  end
  return n
end

local function update_play()
  t = t + 1
  if btn("left") and px > 2 then px = px - 1.5 end
  if btn("right") and px < W - 15 then px = px + 1.5 end
  if btnp("a") and pbullet == nil then
    pbullet = { x = px + 6, y = py - 1 }
  end
  if pbullet then
    pbullet.y = pbullet.y - 3
    if pbullet.y < 0 then pbullet = nil end
  end

  alien_move_timer = alien_move_timer + 1
  if alien_move_timer >= alien_move_interval then
    alien_move_timer = 0
    alien_frame = 1 - alien_frame
    local min_x, max_x = 999, -999
    for i = 1, #aliens do
      local a = aliens[i]
      if a.alive then
        if a.x < min_x then min_x = a.x end
        local aw = (a.type == 1) and 8 or ((a.type == 2) and 11 or 12)
        if a.x + aw > max_x then max_x = a.x + aw end
      end
    end
    local drop = false
    if alien_dir == 1 and max_x >= W - 4 then drop = true end
    if alien_dir == -1 and min_x <= 4 then drop = true end
    if drop then
      alien_dir = -alien_dir
      for i = 1, #aliens do
        if aliens[i].alive then aliens[i].y = aliens[i].y + 4 end
      end
    else
      for i = 1, #aliens do
        if aliens[i].alive then aliens[i].x = aliens[i].x + alien_dir * 2 end
      end
    end
    local alive = count_alive()
    if alive <= 5 then alien_move_interval = 3
    elseif alive <= 10 then alien_move_interval = 6
    elseif alive <= 20 then alien_move_interval = 10
    elseif alive <= 35 then alien_move_interval = 15
    else alien_move_interval = 20 end
  end

  if pbullet then
    for i = 1, #aliens do
      local a = aliens[i]
      if a.alive then
        local aw = (a.type == 1) and 8 or ((a.type == 2) and 11 or 12)
        if pbullet.x >= a.x and pbullet.x <= a.x + aw
          and pbullet.y >= a.y and pbullet.y <= a.y + 8 then
          a.alive = false
          explosions[#explosions + 1] = { x = a.x, y = a.y, timer = 10 }
          if a.type == 1 then pscore = pscore + 30
          elseif a.type == 2 then pscore = pscore + 20
          else pscore = pscore + 10 end
          pbullet = nil
          break
        end
      end
    end
  end

  alien_shoot_timer = alien_shoot_timer + 1
  if alien_shoot_timer >= 30 then
    alien_shoot_timer = 0
    local shooters = {}
    for i = 1, #aliens do
      if aliens[i].alive then
        local col = math.floor((aliens[i].x - 10) / 13 + 0.5)
        local dominated = false
        for j = 1, #aliens do
          if aliens[j].alive and j ~= i then
            local jcol = math.floor((aliens[j].x - 10) / 13 + 0.5)
            if jcol == col and aliens[j].y > aliens[i].y then
              dominated = true; break
            end
          end
        end
        if not dominated then shooters[#shooters + 1] = aliens[i] end
      end
    end
    if #shooters > 0 then
      local s = shooters[math.random(#shooters)]
      local aw = (s.type == 1) and 4 or ((s.type == 2) and 5 or 6)
      alien_bullets[#alien_bullets + 1] = { x = s.x + aw, y = s.y + 8 }
    end
  end

  for i = #alien_bullets, 1, -1 do
    local b = alien_bullets[i]
    b.y = b.y + 1.5
    if b.y > H then
      table.remove(alien_bullets, i)
    elseif b.x >= px and b.x <= px + 13 and b.y >= py and b.y <= py + 8 then
      table.remove(alien_bullets, i)
      plives = plives - 1
      explosions[#explosions + 1] = { x = px, y = py, timer = 20 }
      if plives <= 0 then
        if pscore > phiscore then phiscore = pscore end
        state = STATE_DEAD
      end
    end
  end

  if pbullet then
    for si = 1, 4 do
      local sx = 8 + (si - 1) * 38
      local sy = H - 32
      local lx = math.floor(pbullet.x - sx + 1)
      local ly = math.floor(pbullet.y - sy + 1)
      if lx >= 1 and lx <= #shield_spr[1] and ly >= 1 and ly <= #shield_spr then
        if shield_hp[si][ly][lx] then
          shield_hp[si][ly][lx] = false
          pbullet = nil; break
        end
      end
    end
  end

  for bi = #alien_bullets, 1, -1 do
    local b = alien_bullets[bi]
    local hit = false
    for si = 1, 4 do
      local sx = 8 + (si - 1) * 38
      local sy = H - 32
      local lx = math.floor(b.x - sx + 1)
      local ly = math.floor(b.y - sy + 1)
      if lx >= 1 and lx <= #shield_spr[1] and ly >= 1 and ly <= #shield_spr then
        if shield_hp[si][ly][lx] then
          for dy = -1, 1 do
            for dx = -1, 1 do
              local ry, rx = ly + dy, lx + dx
              if ry >= 1 and ry <= #shield_spr and rx >= 1 and rx <= #shield_spr[1] then
                shield_hp[si][ry][rx] = false
              end
            end
          end
          hit = true; break
        end
      end
    end
    if hit then table.remove(alien_bullets, bi) end
  end

  ufo_timer = ufo_timer + 1
  if ufo == nil and ufo_timer > 600 then
    ufo_timer = 0
    local dir = (math.random(2) == 1) and 1 or -1
    ufo = { x = (dir == 1) and -16 or W, dir = dir }
  end
  if ufo then
    ufo.x = ufo.x + ufo.dir * 0.8
    if ufo.x < -20 or ufo.x > W + 20 then ufo = nil end
    if pbullet and ufo then
      if pbullet.x >= ufo.x and pbullet.x <= ufo.x + 16
        and pbullet.y >= 10 and pbullet.y <= 17 then
        pscore = pscore + 100
        explosions[#explosions + 1] = { x = ufo.x, y = 10, timer = 15 }
        ufo = nil; pbullet = nil
      end
    end
  end

  for i = #explosions, 1, -1 do
    explosions[i].timer = explosions[i].timer - 1
    if explosions[i].timer <= 0 then table.remove(explosions, i) end
  end

  for i = 1, #aliens do
    if aliens[i].alive and aliens[i].y + 8 >= py then
      if pscore > phiscore then phiscore = pscore end
      state = STATE_DEAD
    end
  end

  if count_alive() == 0 then state = STATE_WIN end
end

local function draw_play()
  cls(0)
  text("SCORE " .. pscore, 2, 2, 1)
  text("HI " .. phiscore, W - 45, 2, 1)
  for i = 1, plives - 1 do
    draw_spr(player_spr, 2 + (i - 1) * 16, H - 8, 1)
  end
  for i = 1, #aliens do
    local a = aliens[i]
    if a.alive then
      local spr
      local f = alien_frame + 1
      if a.type == 1 then spr = alien1[f]
      elseif a.type == 2 then spr = alien2[f]
      else spr = alien3[f] end
      draw_spr(spr, a.x, a.y, 1)
    end
  end
  draw_spr(player_spr, math.floor(px), math.floor(py), 1)
  if pbullet then
    rectf(math.floor(pbullet.x), math.floor(pbullet.y), 1, 4, 1)
  end
  for i = 1, #alien_bullets do
    local b = alien_bullets[i]
    local bx = math.floor(b.x)
    local by = math.floor(b.y)
    pix(bx, by, 1)
    pix(bx, by + 1, 1)
    pix(bx + ((by % 4 < 2) and 1 or -1), by + 2, 1)
    pix(bx, by + 3, 1)
  end
  for si = 1, 4 do
    local sx = 8 + (si - 1) * 38
    local sy = H - 32
    for row = 1, #shield_spr do
      for col = 1, #shield_spr[1] do
        if shield_hp[si][row][col] then
          pix(sx + col - 1, sy + row - 1, 1)
        end
      end
    end
  end
  if ufo then
    draw_spr(ufo_spr, math.floor(ufo.x), 10, 1)
  end
  for i = 1, #explosions do
    local e = explosions[i]
    local ex = math.floor(e.x)
    local ey = math.floor(e.y)
    for j = 1, 6 do
      local dx = math.random(-5, 5)
      local dy = math.random(-5, 5)
      pix(ex + 4 + dx, ey + 4 + dy, 1)
    end
  end
  line(0, H - 9, W - 1, H - 9, 1)
end

local title_blink = 0

local function draw_title()
  cls(0)
  title_blink = title_blink + 1
  text("SPACE INVADERS", 20, 20, 1)
  draw_spr(ufo_spr, 40, 45, 1)
  text("= ?  PTS", 60, 47, 1)
  draw_spr(alien1[1], 44, 60, 1)
  text("= 30 PTS", 60, 62, 1)
  draw_spr(alien2[1], 42, 75, 1)
  text("= 20 PTS", 60, 77, 1)
  draw_spr(alien3[1], 41, 90, 1)
  text("= 10 PTS", 60, 92, 1)
  if title_blink % 40 < 28 then
    text("PRESS START", 30, 120, 1)
  end
end

local function draw_dead()
  cls(0)
  text("GAME OVER", 40, 50, 1)
  text("SCORE " .. pscore, 40, 65, 1)
  text("HI " .. phiscore, 40, 80, 1)
  title_blink = title_blink + 1
  if title_blink % 40 < 28 then
    text("PRESS START", 30, 110, 1)
  end
end

local function draw_win()
  cls(0)
  text("YOU WIN!", 45, 50, 1)
  text("SCORE " .. pscore, 40, 65, 1)
  title_blink = title_blink + 1
  if title_blink % 40 < 28 then
    text("PRESS START", 30, 110, 1)
  end
end

function _init()
  state = STATE_TITLE
  title_blink = 0
end

function _update()
  if state == STATE_TITLE or state == STATE_DEAD or state == STATE_WIN then
    if btnp("start") then reset_game() end
  elseif state == STATE_PLAY then
    update_play()
  end
end

function _draw()
  if state == STATE_TITLE then draw_title()
  elseif state == STATE_PLAY then draw_play()
  elseif state == STATE_DEAD then draw_dead()
  elseif state == STATE_WIN then draw_win()
  end
end
`;

// Editor
const editor = new EditorView({
  doc: DEFAULT_CODE,
  extensions: [basicSetup, darkTheme],
  parent: document.getElementById("editor-wrap")
});

// Engine controls
let running = false;
let frameCounter = 0;
let fpsInterval = null;

function updateStatus(isRunning) {
  running = isRunning;
  const dot = document.getElementById("status-dot");
  const text = document.getElementById("status-text");
  dot.className = "status-dot" + (isRunning ? " running" : "");
  text.className = isRunning ? "running" : "";
  text.textContent = isRunning ? "running" : "stopped";
  document.getElementById("status-fps").textContent = isRunning ? "30 fps" : "-- fps";
}

function updateFrame() {
  if (running) {
    const f = Mono._getFrame();
    document.getElementById("status-frame").textContent = "frame: " + f;
  }
}

async function start() {
  if (running) Mono.stop();
  document.getElementById("log-body").innerHTML = "";
  logToConsole("Booting...", "log-info");

  const source = editor.state.doc.toString();
  try {
    await Mono.boot("screen", { source, noAutoFit: true, externalInput: true });
    updateStatus(true);
    logToConsole("Running.", "log-info");
    document.getElementById("screen-body").focus();

    Mono.shader.preset();

    if (fpsInterval) clearInterval(fpsInterval);
    fpsInterval = setInterval(updateFrame, 200);
  } catch (e) {
    logToConsole("Boot error: " + e.message, "log-error");
    updateStatus(false);
  }
}

function stop() {
  if (running) {
    Mono.stop();
    updateStatus(false);
    if (fpsInterval) { clearInterval(fpsInterval); fpsInterval = null; }
    logToConsole("Stopped.", "log-info");
  }
}

document.getElementById("btn-start").addEventListener("click", start);
document.getElementById("btn-stop").addEventListener("click", stop);
document.getElementById("btn-pause").addEventListener("click", () => {
  if (running) {
    document.dispatchEvent(new KeyboardEvent("keydown", { key: " ", bubbles: true }));
    document.dispatchEvent(new KeyboardEvent("keyup", { key: " ", bubbles: true }));
  }
});

// Cmd/Ctrl+Enter to run (global)
document.addEventListener("keydown", (e) => {
  if ((e.metaKey || e.ctrlKey) && e.key === "Enter") {
    e.preventDefault();
    start();
  }
});

// Screen widget: keyboard → engine
const screenBody = document.getElementById("screen-body");
screenBody.addEventListener("keydown", (e) => {
  if (!running || !Mono.setKey) return;
  const k = Mono.keyMap ? Mono.keyMap[e.key] : null;
  if (k) {
    Mono.setKey(k, true);
    e.preventDefault();
  } else if (e.key.length === 1) {
    console.warn('[Mono] Valid keys: arrows, z(A), x(B), Enter(Start), Space(Select)');
  }
});
screenBody.addEventListener("keyup", (e) => {
  if (!running || !Mono.setKey) return;
  const k = Mono.keyMap ? Mono.keyMap[e.key] : null;
  if (k) {
    Mono.setKey(k, false);
    e.preventDefault();
  }
});

// Auto-focus screen on start
const _origStart = start;

</script>
